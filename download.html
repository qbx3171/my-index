    ];
    
    // 从Airtable获取软件数据（线上）
    async function fetchSoftwaresFromAirtable() {
        try {
            let url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/softwares?maxRecords=100`;
            let res = await fetch(url, { headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` } });
            if (!res.ok) throw new Error('Network error');
            let data = await res.json();
            return data.records.map(rec => {
                let f = rec.fields;
                let name = f['A name'] || f.name || '未命名';
                return {
                    name: name,
                    category: f['A category'] || f.category || 'other',
                    version: f.version || '',
                    description: f.description || '',
                    os: f.os || ['Windows','Mac'],
                    downloads: Math.floor(Math.random()*3000)+500,
                    addedDate: f.addedDate || new Date().toISOString().split('T')[0],
                    icon: f.icon || f['Icon'] || 'fa-cube',
                    url: f.url || '#'
                };
            });
        } catch(e) { throw e; }
    }
    
    // 从Airtable获取广告数据（线上）
    async function fetchAdsFromAirtable() {
        try {
            let url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/Ads?maxRecords=50`;
            let res = await fetch(url, { headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` } });
            if (!res.ok) throw new Error('Network error');
            let data = await res.json();
            let banner = [], sidebar = [];
            for (let rec of data.records) {
                let f = rec.fields;
                let img = f.Image || f.image || '';
                if (Array.isArray(img) && img[0] && img[0].url) img = img[0].url;
                if (!img) continue;
                let ad = { image: img, link: f.Link || f.link || '#', title: f.Title || f.title || '' };
                let pos = (f.Position || f.position || 'sidebar').toLowerCase();
                if (pos === 'banner') banner.push(ad);
                else sidebar.push(ad);
            }
            return { banner, sidebar };
        } catch(e) { throw e; }
    }
    
    async function loadSoftwaresAndAds() {
        if (isLocalFile) {
            softwares = [...DEFAULT_SOFTWARES];
            bannerAds = [...DEFAULT_BANNER_ADS];
            sidebarAds = [...DEFAULT_SIDEBAR_ADS];
        } else {
            let cachedSoft = localStorage.getItem('cachedSoftwares');
            let cachedBanner = localStorage.getItem('cachedBannerAds');
            let cachedSidebar = localStorage.getItem('cachedSidebarAds');
            if (cachedSoft) { try { softwares = JSON.parse(cachedSoft); } catch(e) {} }
            if (cachedBanner) { try { bannerAds = JSON.parse(cachedBanner); } catch(e) {} }
            if (cachedSidebar) { try { sidebarAds = JSON.parse(cachedSidebar); } catch(e) {} }
            try {
                let [sw, ads] = await Promise.all([fetchSoftwaresFromAirtable(), fetchAdsFromAirtable()]);
                if (sw && sw.length) { softwares = sw; localStorage.setItem('cachedSoftwares', JSON.stringify(sw)); }
                if (ads.banner && ads.banner.length) { bannerAds = ads.banner; localStorage.setItem('cachedBannerAds', JSON.stringify(bannerAds)); }
                if (ads.sidebar && ads.sidebar.length) { sidebarAds = ads.sidebar; localStorage.setItem('cachedSidebarAds', JSON.stringify(sidebarAds)); }
            } catch(e) {
                console.warn('Airtable加载失败，使用缓存数据', e);
                if (!softwares.length) softwares = [...DEFAULT_SOFTWARES];
                if (!bannerAds.length) bannerAds = [...DEFAULT_BANNER_ADS];
                if (!sidebarAds.length) sidebarAds = [...DEFAULT_SIDEBAR_ADS];
            }
        }
        renderAll();
    }
    
    // 轮播图渲染
    function renderCarousel(slidesId, dotsId, ads, isBanner, startFn) {
        let slidesEl = document.getElementById(slidesId);
        let dotsEl = document.getElementById(dotsId);
        if (!slidesEl || !dotsEl) return;
        slidesEl.innerHTML = ads.map((a,i) => `<div class="carousel-slide"><a href="${a.link}" target="_blank"><img src="${a.image}" loading="lazy" alt="广告"></a></div>`).join('');
        if (ads.length <= 1) {
            dotsEl.style.display = 'none';
            return;
        }
        dotsEl.style.display = 'flex';
        dotsEl.innerHTML = ads.map((_,i) => `<div class="carousel-dot ${i===0?'active':''}" data-index="${i}"></div>`).join('');
        let update = (idx) => {
            if (isBanner) curBanner = idx; else curSidebar = idx;
            slidesEl.style.transform = `translateX(-${idx*100}%)`;
            dotsEl.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
        };
        dotsEl.querySelectorAll('.carousel-dot').forEach(d => d.addEventListener('click', (e) => {
            update(parseInt(e.target.dataset.index));
            resetCarousel(isBanner);
        }));
        if (startFn) startFn(isBanner);
        return update;
    }
    function startCarousel(isBanner) {
        clearInterval(isBanner ? bannerInt : sidebarInt);
        let ads = isBanner ? bannerAds : sidebarAds;
        if (ads.length <= 1) return;
        let int = setInterval(() => {
            let nxt = ((isBanner ? curBanner : curSidebar) + 1) % ads.length;
            let slidesId = isBanner ? 'bannerSlides' : 'sidebarSlides';
            let dotsId = isBanner ? 'bannerDots' : 'sidebarDots';
            let slidesEl = document.getElementById(slidesId);
            let dotsEl = document.getElementById(dotsId);
            if (slidesEl && dotsEl) {
                slidesEl.style.transform = `translateX(-${nxt*100}%)`;
                dotsEl.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active', i===nxt));
            }
            if (isBanner) curBanner = nxt; else curSidebar = nxt;
        }, 4000);
        if (isBanner) bannerInt = int; else sidebarInt = int;
    }
    function resetCarousel(isBanner) { clearInterval(isBanner ? bannerInt : sidebarInt); startCarousel(isBanner); }
    
    // 图标渲染
    function renderIcon(icon) {
        if (!icon) return '<i class="fas fa-cube"></i>';
        if (typeof icon === 'string') {
            if (icon.startsWith('http')) return `<img src="${icon}" style="width:100%;height:100%;object-fit:cover;">`;
            if (icon.startsWith('fa-') || icon.startsWith('fas ') || icon.startsWith('far ') || icon.startsWith('fab ')) {
                return `<i class="fas ${icon}"></i>`;
            }
            return `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#eef1fd;border-radius:12px;font-weight:bold;">${icon.slice(0,2).toUpperCase()}</div>`;
        }
        return '<i class="fas fa-cube"></i>';
    }
    
    const CAT_MAP = { 'adobe':'Adobe系列','autodesk':'Autodesk系列','c4d':'Cinema 4D','sketchup':'草图大师','rhino':'犀牛软件','plugin':'插件工具','other':'其他' };
    function renderCats() {
        let cats = new Map();
        softwares.forEach(s => cats.set(CAT_MAP[s.category]||s.category, s.category));
        let html = `<button class="cat-chip ${currentCategory==='all'?'active':''}" data-cat="all">全部</button>`;
        for (let [disp, cat] of cats) html += `<button class="cat-chip ${currentCategory===cat?'active':''}" data-cat="${cat}">${disp}</button>`;
        document.getElementById('categoryTabs').innerHTML = html;
        document.querySelectorAll('.cat-chip').forEach(btn => btn.addEventListener('click', () => {
            currentCategory = btn.dataset.cat;
            renderCats();
            renderGrid();
        }));
    }
    function renderGrid() {
        let filtered = softwares.filter(s => (currentCategory==='all'||s.category===currentCategory) && s.name.toLowerCase().includes(searchKeyword.toLowerCase()));
        let items = showAll ? filtered : filtered.slice(0, 12);
        let grid = document.getElementById('softwareGrid');
        if (!items.length) { grid.innerHTML = '<div>没有找到相关软件</div>'; return; }
        grid.innerHTML = items.map(sw => `
            <div class="software-card" data-name="${esc(sw.name)}">
                <div class="card-icon">${renderIcon(sw.icon)}</div>
                <div class="software-name">${esc(sw.name)}</div>
                <div class="version">${esc(sw.version)}</div>
                <div class="description">${esc(sw.description)}</div>
                <div class="os-tags">${sw.os.map(o=>`<span class="os-badge">${o}</span>`).join('')}</div>
                <div class="card-footer"><span>${sw.addedDate}</span><span><i class="fas fa-download"></i> ${sw.downloads}</span></div>
            </div>
        `).join('');
        document.querySelectorAll('.software-card').forEach(card => card.addEventListener('click', () => {
            let sw = softwares.find(s => s.name === card.dataset.name);
            if (sw) downloadSoftware(sw);
        }));
    }
    function downloadSoftware(sw) {
        if (!currentUser) { showToast('请先登录', 'error'); openAuthModal('login'); return; }
        if (!canDownload(currentUser)) { showToast(`本月下载次数已用完（30次/月），邀请好友可获额外次数`, 'warning'); return; }
        recordDownload(currentUser);
        updateUserUI();
        if (sw.url && sw.url !== '#') window.open(sw.url, '_blank');
        else showToast(`演示模式：您已消耗1次下载机会`, 'success');
        addHistory(sw.name);
        renderRank();
    }
    function addHistory(name) {
        let h = JSON.parse(localStorage.getItem('browseHistory')||'[]');
        h = h.filter(i => i !== name);
        h.unshift(name);
        if (h.length > 10) h.pop();
        localStorage.setItem('browseHistory', JSON.stringify(h));
        renderHistory();
    }
    function renderHistory() {
        let h = JSON.parse(localStorage.getItem('browseHistory')||'[]');
        let container = document.getElementById('historyList');
        if (!h.length) { container.innerHTML = '<div style="color:#8b90a5; padding:8px;">暂无浏览记录</div>'; return; }
        container.innerHTML = h.map(n => `<div class="history-item"><i class="fas fa-clock"></i><span class="history-name">${esc(n)}</span></div>`).join('');
    }
    function renderRank() {
        let sorted = [...softwares].sort((a,b) => b.downloads - a.downloads);
        let container = document.getElementById('rankList');
        if (!sorted.length) { container.innerHTML = '<div style="color:#8b90a5; padding:8px;">暂无排行数据</div>'; return; }
        container.innerHTML = sorted.slice(0,8).map((sw,i) => `
            <div class="rank-item">
                <div class="rank-number ${i===0?'top1':i===1?'top2':i===2?'top3':''}">${i+1}</div>
                <div class="rank-name">${esc(sw.name)}</div>
                <div class="rank-downloads"><i class="fas fa-download"></i> ${sw.downloads}</div>
            </div>
        `).join('');
    }
    
    // 用户界面
    function updateUserUI() {
        let area = document.getElementById('userArea');
        if (currentUser) {
            let remaining = getRemainingCount(currentUser);
            let badge = `<span class="download-badge">${remaining===Infinity?'∞':remaining}</span>`;
            let vip = currentUser.role === 'vip' ? '<span class="vip-badge">VIP</span>' : '';
            area.innerHTML = `<div style="position:relative;"><button class="user-name-btn" id="userMenuBtn"><i class="fas fa-user-circle"></i> ${esc(currentUser.username)} ${badge} ${vip} <i class="fas fa-chevron-down"></i></button><div class="dropdown" id="userDropdown"><button id="profileBtn">个人中心</button><button id="adminBtn" style="${currentUser.role==='admin'?'display:block':'display:none'}">管理后台</button><button id="logoutBtn">退出登录</button></div></div>`;
            document.getElementById('userMenuBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('userDropdown').classList.toggle('show'); };
            document.getElementById('logoutBtn').onclick = () => { currentUser = null; localStorage.removeItem('lezhe_user'); updateUserUI(); showToast('已退出'); };
            document.getElementById('profileBtn').onclick = openProfileModal;
            if (currentUser.role === 'admin') document.getElementById('adminBtn').onclick = openAdminModal;
        } else {
            area.innerHTML = '<button class="auth-btn" id="showAuthBtn"><i class="fas fa-user-lock"></i> 登录 / 注册</button>';
            document.getElementById('showAuthBtn').onclick = () => openAuthModal('login');
        }
    }
    function openProfileModal() {
        document.getElementById('profileUsername').innerText = currentUser.username;
        document.getElementById('profileRole').innerHTML = currentUser.role === 'vip' ? 'VIP会员（无限下载）' : '普通会员（30次/月）';
        document.getElementById('profileRemaining').innerText = currentUser.role === 'vip' ? '∞' : getRemainingCount(currentUser);
        document.getElementById('myInviteCode').innerText = currentUser.inviteCode || '暂无';
        document.getElementById('profileModal').classList.add('active');
    }
    function openAdminModal() {
        let html = '<table class="admin-table"><thead><tr><th>邮箱</th><th>用户名</th><th>角色</th><th>操作</th></tr></thead><tbody>';
        for (let u of users) {
            let role = u.role || 'user';
            html += `<tr><td>${esc(u.email)}</td><td>${esc(u.username)}</td><td>${role}</td><td><button class="changeRoleBtn" data-email="${u.email}" data-role="${role}">${role==='vip'?'降级为普通':'升级为VIP'}</button></td></tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('adminUserList').innerHTML = html;
        document.querySelectorAll('.changeRoleBtn').forEach(btn => btn.addEventListener('click', () => {
            let email = btn.dataset.email;
            let newRole = btn.dataset.role === 'vip' ? 'user' : 'vip';
            updateUserRole(email, newRole);
            showToast(`用户已${newRole==='vip'?'升级为VIP':'降级为普通会员'}`, 'success');
            openAdminModal();
        }));
        document.getElementById('adminModal').classList.add('active');
    }
    
    // 认证模态框
    let authModal = document.getElementById('authModal');
    function openAuthModal(tab='login') {
        document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
        document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
        document.getElementById('forgotForm').style.display = 'none';
        authModal.classList.add('active');
        if (tab==='login') refreshCaptcha('loginCaptchaQ','loginCaptchaInput');
        else refreshCaptcha('regCaptchaQ','regCaptchaInput');
    }
    function bindEvents() {
        document.getElementById('closeAuthModal').onclick = () => authModal.classList.remove('active');
        document.getElementById('closeProfileModal').onclick = () => document.getElementById('profileModal').classList.remove('active');
        document.getElementById('closeAdminModal').onclick = () => document.getElementById('adminModal').classList.remove('active');
        document.querySelectorAll('.auth-tab').forEach(t => t.onclick = () => openAuthModal(t.dataset.tab));
        document.getElementById('showForgotBtn').onclick = () => { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='none'; document.getElementById('forgotForm').style.display='block'; refreshCaptcha('forgotCaptchaQ','forgotCaptchaInput'); };
        document.getElementById('backToLoginBtn').onclick = () => openAuthModal('login');
        document.getElementById('refreshLoginCaptcha').onclick = () => refreshCaptcha('loginCaptchaQ','loginCaptchaInput');
        document.getElementById('refreshRegCaptcha').onclick = () => refreshCaptcha('regCaptchaQ','regCaptchaInput');
        document.getElementById('refreshForgotCaptcha').onclick = () => refreshCaptcha('forgotCaptchaQ','forgotCaptchaInput');
        document.getElementById('loginBtn').onclick = () => {
            let email = document.getElementById('loginEmail').value.trim();
            let pwd = document.getElementById('loginPassword').value;
            let cap = document.getElementById('loginCaptchaInput').value.trim();
            if (!cap || parseInt(cap) !== currentCaptcha.answer) return showToast('验证码错误','error');
            try {
                currentUser = loginUser(email, pwd);
                localStorage.setItem('lezhe_user', JSON.stringify(currentUser));
                updateUserUI();
                authModal.classList.remove('active');
                showToast('登录成功');
            } catch(e) { showToast(e.message,'error'); }
        };
        document.getElementById('registerBtn').onclick = () => {
            let username = document.getElementById('regUsername').value.trim();
            let email = document.getElementById('regEmail').value.trim();
            let pwd = document.getElementById('regPassword').value;
            let conf = document.getElementById('regConfirm').value;
            let invite = document.getElementById('regInviteCode').value.trim();
            let cap = document.getElementById('regCaptchaInput').value.trim();
            if (!username || !email || pwd !== conf || pwd.length<6) return showToast('信息有误','error');
            if (!cap || parseInt(cap) !== currentCaptcha.answer) return showToast('验证码错误','error');
            try {
                registerUser(email, pwd, username, invite);
                showToast('注册成功，请登录');
                openAuthModal('login');
            } catch(e) { showToast(e.message,'error'); }
        };
        document.getElementById('resetPwdBtn').onclick = () => {
            let email = document.getElementById('forgotEmail').value.trim();
            let newPwd = document.getElementById('forgotNewPwd').value;
            let conf = document.getElementById('forgotConfirmPwd').value;
            let cap = document.getElementById('forgotCaptchaInput').value.trim();
            if (!email || newPwd !== conf || newPwd.length<6) return showToast('信息错误','error');
            if (!cap || parseInt(cap) !== currentCaptcha.answer) return showToast('验证码错误','error');
            try {
                updatePassword(email, newPwd);
                showToast('密码重置成功，请登录');
                openAuthModal('login');
            } catch(e) { showToast(e.message,'error'); }
        };
        document.getElementById('saveProfileBtn').onclick = () => {
            let newPwd = document.getElementById('profileNewPwd').value;
            let conf = document.getElementById('profileConfirmPwd').value;
            if (newPwd && newPwd !== conf) return showToast('两次密码不一致','error');
            if (newPwd && newPwd.length<6) return showToast('密码至少6位','error');
            if (newPwd) {
                try {
                    updatePassword(currentUser.email, newPwd);
                    showToast('密码已更新');
                } catch(e) { showToast('更新失败','error'); }
            }
            document.getElementById('profileModal').classList.remove('active');
        };
        document.getElementById('clearHistory').onclick = () => { localStorage.removeItem('browseHistory'); renderHistory(); };
        document.getElementById('submitFeedback').onclick = () => {
            let name = document.getElementById('feedbackName').value.trim() || '网友';
            let msg = document.getElementById('feedbackMessage').value.trim();
            if (!msg) return showToast('请输入留言内容','error');
            let list = JSON.parse(localStorage.getItem('feedback_list')||'[]');
            list.unshift({ name, message: msg, time: new Date().toLocaleString() });
            if (list.length > 20) list.pop();
            localStorage.setItem('feedback_list', JSON.stringify(list));
            document.getElementById('feedbackMessage').value = '';
            renderFeedback();
            showToast('留言成功');
        };
    }
    function renderFeedback() {
        let list = JSON.parse(localStorage.getItem('feedback_list')||'[]');
        let container = document.getElementById('feedbackList');
        if (!list.length) { container.innerHTML = '<div style="color:#8b90a5;">暂无留言</div>'; return; }
        container.innerHTML = list.map(m => `<div style="padding:8px 0;border-bottom:1px solid #e8ecf3;"><strong>${esc(m.name)}</strong><div style="font-size:0.7rem;margin-top:4px;">${esc(m.message)}</div></div>`).join('');
    }
    
    // 搜索
    document.getElementById('searchInput').addEventListener('input', (e) => { searchKeyword = e.target.value; renderGrid(); });
    document.getElementById('searchBtn').addEventListener('click', () => { searchKeyword = document.getElementById('searchInput').value; renderGrid(); });
    
    // 滚动顶部
    window.addEventListener('scroll', () => document.getElementById('backToTop').classList.toggle('show', window.scrollY > 300));
    document.getElementById('backToTop').onclick = () => window.scrollTo({top:0,behavior:'smooth'});
    
    function renderAll() {
        renderCats();
        renderGrid();
        renderRank();
        renderHistory();
        renderFeedback();
        renderCarousel('bannerSlides', 'bannerDots', bannerAds, true, null);
        renderCarousel('sidebarSlides', 'sidebarDots', sidebarAds, false, null);
        startCarousel(true);
        startCarousel(false);
    }
    
    // 初始化
    loadUsers();
    ensureAdmin();
    let savedUser = localStorage.getItem('lezhe_user');
    if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
    updateUserUI();
    bindEvents();
    loadSoftwaresAndAds();
})();
</script>
