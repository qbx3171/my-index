<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>乐哲软件 · 资源库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        /* ===== 浅色科技风 ===== */
        :root {
            --bg-primary: #eef2f7;
            --bg-secondary: #f5f8fc;
            --bg-card: rgba(255, 255, 255, 0.75);
            --bg-card-solid: #ffffff;
            --border-glow: rgba(0, 120, 255, 0.15);
            --border-glow-strong: rgba(0, 120, 255, 0.30);
            --text-primary: #1a2332;
            --text-secondary: #4a5b6e;
            --text-dim: #8a9bb0;
            --accent-cyan: #0088ff;
            --accent-blue: #0066cc;
            --accent-purple: #6c5ce7;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.06);
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, sans-serif;
            --max-width: 1200px;
            --header-height: 64px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
        input { font-family: inherit; border: none; outline: none; background: none; color: var(--text-primary); }
        .container { max-width: var(--max-width); margin: 0 auto; padding: 0 24px; }
        .hidden { display: none !important; }

        /* ===== 组件 ===== */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 10px 28px; border-radius: 50px; font-size: 0.9rem; font-weight: 600;
            transition: var(--transition); border: 1px solid transparent;
            background: var(--bg-card); color: var(--text-primary);
            backdrop-filter: blur(8px); border-color: var(--border-glow);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,136,255,0.15); border-color: var(--accent-cyan); }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #fff; border-color: transparent; font-weight: 700;
        }
        .btn-primary:hover { box-shadow: 0 4px 24px rgba(0,136,255,0.3); transform: translateY(-2px) scale(1.02); }
        .btn-outline { background: transparent; border-color: var(--border-glow); color: var(--text-secondary); }
        .btn-outline:hover { background: rgba(0,136,255,0.06); border-color: var(--accent-cyan); color: var(--text-primary); }
        .btn-sm { padding: 6px 18px; font-size: 0.8rem; }

        .card {
            background: var(--bg-card); backdrop-filter: blur(16px);
            border-radius: var(--radius-lg); border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card); transition: var(--transition); overflow: hidden;
        }
        .card:hover { border-color: var(--border-glow-strong); box-shadow: 0 12px 40px rgba(0,0,0,0.08); transform: translateY(-4px); }

        .badge {
            display: inline-block; padding: 2px 14px; border-radius: 50px;
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            background: rgba(0,136,255,0.10); color: var(--accent-cyan);
            border: 1px solid rgba(0,136,255,0.15);
        }
        .badge-purple { background: rgba(108,92,231,0.10); color: var(--accent-purple); border-color: rgba(108,92,231,0.15); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
        .empty-state h3 { font-size: 1.2rem; margin-bottom: 8px; color: var(--text-primary); }

        /* ===== 头部 ===== */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(238,242,247,0.85); backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border-glow); height: var(--header-height);
        }
        .header-inner { display: flex; align-items: center; justify-content: space-between; height: var(--header-height); }
        .logo {
            display: flex; align-items: center; gap: 10px;
            font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px;
            color: var(--text-primary);
        }
        .logo .mark {
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #fff; font-size: 1.1rem; font-weight: 800;
            box-shadow: 0 2px 12px rgba(0,136,255,0.25);
        }
        .logo span { font-weight: 300; color: var(--text-secondary); font-size: 0.75rem; margin-left: 4px; letter-spacing: 1px; }

        .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; }
        .nav-links a {
            font-size: 0.85rem; font-weight: 500; color: var(--text-secondary);
            transition: var(--transition); position: relative;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 2px; background: var(--accent-cyan);
            transition: var(--transition);
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }

        .mobile-toggle { display: none; font-size: 1.4rem; color: var(--text-secondary); padding: 4px; }

        /* ===== Hero ===== */
        .hero { padding: 50px 0 32px; text-align: center; position: relative; }
        .hero::before {
            content: '◆'; position: absolute; right: 5%; top: 10%;
            font-size: 120px; opacity: 0.06; color: var(--accent-cyan);
            transform: rotate(10deg); font-weight: 100;
        }
        .hero h1 {
            font-size: 3rem; font-weight: 700; letter-spacing: -1px;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .hero h1 .highlight {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero p { font-size: 1rem; color: var(--text-secondary); max-width: 480px; margin: 0 auto 28px; font-weight: 300; }
        .hero .search-box {
            display: flex; max-width: 480px; margin: 0 auto;
            background: var(--bg-card); backdrop-filter: blur(16px);
            border-radius: 60px; border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card); overflow: hidden; transition: var(--transition);
        }
        .hero .search-box:focus-within { border-color: var(--accent-cyan); box-shadow: 0 4px 24px rgba(0,136,255,0.08); }
        .hero .search-box input { flex: 1; padding: 12px 22px; font-size: 0.9rem; background: transparent; color: var(--text-primary); }
        .hero .search-box input::placeholder { color: var(--text-dim); }
        .hero .search-box button {
            padding: 0 24px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #fff; font-weight: 700; transition: var(--transition); font-size: 0.9rem;
        }
        .hero .search-box button:hover { filter: brightness(1.05); box-shadow: 0 0 20px rgba(0,136,255,0.2); }

        /* ===== 分类 & 网格 ===== */
        .section-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.5px; color: var(--text-primary); }
        .section-sub { color: var(--text-secondary); font-weight: 400; margin-bottom: 20px; font-size: 0.9rem; }

        .categories-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 14px; margin: 24px 0 14px;
        }
        .category-item {
            display: flex; flex-direction: column; align-items: center;
            padding: 16px 10px; border-radius: var(--radius-md);
            background: var(--bg-card); backdrop-filter: blur(8px);
            border: 1px solid var(--border-glow); transition: var(--transition);
            cursor: pointer; text-align: center;
        }
        .category-item:hover {
            transform: translateY(-4px); background: rgba(255,255,255,0.85);
            border-color: var(--accent-cyan); box-shadow: 0 4px 20px rgba(0,136,255,0.08);
        }
        .category-item .icon { font-size: 24px; margin-bottom: 4px; }
        .category-item .name { font-size: 0.8rem; font-weight: 500; color: var(--text-primary); }
        .category-item .count { font-size: 0.65rem; color: var(--text-dim); margin-top: 2px; }
        .category-item.active { border-color: var(--accent-cyan); background: rgba(0,136,255,0.06); box-shadow: 0 0 20px rgba(0,136,255,0.05); }

        .software-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 22px; margin-top: 6px;
        }
        .software-card {
            padding: 22px 20px 18px; transition: var(--transition); cursor: default;
            display: flex; flex-direction: column;
            background: var(--bg-card); backdrop-filter: blur(16px);
            border-radius: var(--radius-lg); border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card);
        }
        .software-card:hover {
            transform: translateY(-6px); border-color: var(--border-glow-strong);
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }
        .software-card .card-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 10px; }
        .software-card .card-icon {
            width: 48px; height: 48px; border-radius: var(--radius-md);
            background: rgba(0,136,255,0.06); display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; border: 1px solid rgba(0,136,255,0.08); overflow: hidden; font-size: 26px;
        }
        .software-card .card-icon img { width: 100%; height: 100%; object-fit: cover; }
        .software-card .card-info { flex: 1; min-width: 0; }
        .software-card .card-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 2px; letter-spacing: -0.2px; color: var(--text-primary); }
        .software-card .card-info .meta {
            font-size: 0.7rem; color: var(--text-secondary);
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        .software-card .card-info .meta .version { color: var(--accent-cyan); }
        .software-card .desc {
            font-size: 0.82rem; color: var(--text-secondary);
            margin: 8px 0 12px; line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            flex: 1;
        }
        .software-card .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            border-top: 1px solid var(--border-glow); padding-top: 12px; margin-top: 2px;
        }
        .software-card .card-footer .stats {
            font-size: 0.7rem; color: var(--text-dim); display: flex; gap: 14px;
        }
        .software-card .card-footer .stats span { display: flex; align-items: center; gap: 4px; }
        .software-card .card-footer .btn { padding: 4px 16px; font-size: 0.7rem; font-weight: 600; }

        /* ===== 分页 ===== */
        .pagination {
            display: flex; justify-content: center; align-items: center;
            gap: 12px; margin-top: 28px; flex-wrap: wrap;
        }
        .pagination button {
            padding: 8px 20px; border-radius: 50px;
            background: var(--bg-card); border: 1px solid var(--border-glow);
            font-weight: 500; transition: var(--transition);
            color: var(--text-secondary);
        }
        .pagination button:hover {
            border-color: var(--accent-cyan); color: var(--text-primary);
            background: rgba(0,136,255,0.04);
        }
        .pagination button.active {
            background: var(--accent-cyan); color: #fff; border-color: var(--accent-cyan);
        }
        .pagination button:disabled {
            opacity: 0.4; cursor: not-allowed;
        }
        .pagination .page-info {
            color: var(--text-secondary); font-size: 0.85rem;
        }

        /* ===== 详情弹窗 ===== */
        .detail-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.30); backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            padding: 20px; opacity: 0; visibility: hidden; transition: var(--transition);
        }
        .detail-overlay.open { opacity: 1; visibility: visible; }
        .detail-modal {
            max-width: 620px; width: 100%; max-height: 90vh; overflow-y: auto;
            padding: 32px 36px 28px; background: var(--bg-card-solid);
            backdrop-filter: blur(32px); border-radius: var(--radius-lg);
            border: 1px solid var(--border-glow-strong);
            box-shadow: 0 24px 64px rgba(0,0,0,0.12);
            transform: scale(0.96) translateY(20px); transition: var(--transition);
        }
        .detail-overlay.open .detail-modal { transform: scale(1) translateY(0); }
        .detail-modal .close-btn {
            float: right; font-size: 1.5rem; color: var(--text-dim);
            transition: var(--transition); line-height: 1;
        }
        .detail-modal .close-btn:hover { color: var(--text-primary); transform: rotate(90deg); }
        .detail-modal .detail-icon {
            font-size: 48px; margin-bottom: 6px; width: 64px; height: 64px;
            border-radius: var(--radius-md); overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,136,255,0.06); border: 1px solid rgba(0,136,255,0.08);
        }
        .detail-modal .detail-icon img { width: 100%; height: 100%; object-fit: cover; }
        .detail-modal h2 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; margin-top: 6px; color: var(--text-primary); }
        .detail-modal .detail-meta {
            display: flex; gap: 16px; flex-wrap: wrap;
            font-size: 0.8rem; color: var(--text-secondary); margin: 6px 0 14px;
        }
        .detail-modal .detail-desc {
            font-size: 0.9rem; line-height: 1.8; color: var(--text-secondary);
            margin: 14px 0 22px; white-space: pre-wrap;
            background: var(--bg-primary); padding: 14px 18px;
            border-radius: var(--radius-sm); border-left: 3px solid var(--accent-cyan);
        }
        .detail-modal .detail-actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .detail-modal .detail-actions .btn { flex: 1; min-width: 120px; }

        .footer {
            padding: 32px 0 24px; border-top: 1px solid var(--border-glow);
            margin-top: 32px; text-align: center;
            color: var(--text-dim); font-size: 0.75rem; letter-spacing: 0.5px;
        }
        .footer .brand { font-size: 1rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 2px; }

        .toast-container {
            position: fixed; bottom: 28px; right: 28px; z-index: 999;
            display: flex; flex-direction: column; gap: 8px; max-width: 340px;
        }
        .toast {
            padding: 12px 20px; border-radius: var(--radius-sm);
            background: var(--bg-card-solid); backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow-strong); box-shadow: var(--shadow-card);
            font-size: 0.85rem; color: var(--text-primary);
            transform: translateX(120%); animation: toastIn 0.4s ease forwards;
            display: flex; align-items: center; gap: 10px;
        }
        .toast.success .icon { color: var(--accent-cyan); }
        .toast.error .icon { color: #e74c3c; }
        .toast .icon { font-size: 1.1rem; }
        @keyframes toastIn { to { transform: translateX(0); } }
        @keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }

        .divider-cyber {
            display: flex; align-items: center; justify-content: center;
            gap: 14px; margin: 10px 0 16px;
            color: var(--text-dim); font-size: 0.65rem; letter-spacing: 4px; font-weight: 300;
        }
        .divider-cyber::before, .divider-cyber::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
        }
        .divider-cyber .dot { font-size: 0.35rem; color: var(--accent-cyan); }

        @media (max-width: 768px) {
            :root { --header-height: 58px; }
            .nav-links {
                display: none; position: absolute; top: var(--header-height); left: 0; right: 0;
                background: rgba(238,242,247,0.96); backdrop-filter: blur(24px);
                flex-direction: column; padding: 16px 24px; gap: 14px;
                border-bottom: 1px solid var(--border-glow); box-shadow: var(--shadow-card);
            }
            .nav-links.open { display: flex; }
            .mobile-toggle { display: block; }
            .hero h1 { font-size: 2rem; }
            .hero p { font-size: 0.9rem; }
            .software-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
            .categories-grid { grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; }
            .category-item { padding: 12px 6px; }
            .category-item .icon { font-size: 20px; }
            .hero .search-box input { padding: 10px 16px; font-size: 0.85rem; }
            .hero .search-box button { padding: 0 16px; font-size: 0.8rem; }
            .pagination button { padding: 6px 14px; font-size: 0.8rem; }
        }
        @media (max-width: 480px) {
            .hero h1 { font-size: 1.6rem; }
            .software-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <header class="header" id="mainHeader">
        <div class="container header-inner">
            <a href="#" class="logo" id="logoHome">
                <span class="mark">◆</span>
                乐哲软件 <span>LEZHE</span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="#" class="active" data-page="home">首页</a></li>
                <li><a href="#" data-page="list">软件库</a></li>
            </ul>
            <button class="mobile-toggle" id="mobileToggle">≡</button>
        </div>
    </header>

    <main>
        <div class="container">
            <section id="pageHome">
                <div class="hero">
                    <h1>探索 · <span class="highlight">乐哲</span> 软件</h1>
                    <p>精选高效工具，赋能创作者生态。</p>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索软件名称或描述..." />
                        <button id="searchBtn">检索</button>
                    </div>
                </div>
                <div class="divider-cyber"><span class="dot">◆</span> 分 类 导 航 <span class="dot">◆</span></div>
                <div class="categories-grid" id="categoryGridHome"></div>
                <div style="margin-top:40px;">
                    <h2 class="section-title">✦ 热门推荐</h2>
                    <p class="section-sub">社区口碑精选</p>
                    <div class="software-grid" id="recommendGrid"></div>
                </div>
                <div style="margin-top:40px;">
                    <h2 class="section-title">✦ 最新上架</h2>
                    <p class="section-sub">持续迭代，保持前沿</p>
                    <div class="software-grid" id="latestGrid"></div>
                </div>
            </section>

            <section id="pageList" class="hidden">
                <div style="padding:16px 0 6px;">
                    <h2 class="section-title">✦ 软件库</h2>
                    <p class="section-sub" id="listSub">全部资源</p>
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;" id="filterTags">
                    <button class="btn btn-sm btn-outline active" data-cat="all">全部</button>
                </div>
                <div class="software-grid" id="listGrid"></div>
                <!-- 分页控件 -->
                <div class="pagination" id="paginationControls">
                    <button id="prevPageBtn" disabled>‹ 上一页</button>
                    <span class="page-info" id="pageInfo">第 1 / 1 页</span>
                    <button id="nextPageBtn">下一页 ›</button>
                </div>
            </section>
        </div>
        <footer class="footer">
            <div class="brand">◆ 乐哲软件</div>
            <p>LEZHE · 构建数字未来</p>
        </footer>
    </main>

    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-modal" id="detailModal">
            <button class="close-btn" id="detailClose">✕</button>
            <div class="detail-icon" id="detailIcon">📦</div>
            <h2 id="detailName">软件名称</h2>
            <div class="detail-meta" id="detailMeta"></div>
            <div class="detail-desc" id="detailDesc"></div>
            <div class="detail-actions">
                <button class="btn btn-primary" id="detailDownload">⬇ 下载</button>
                <button class="btn btn-outline" id="detailCloseBtn">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // ===== 数据层 (与后台共享 localStorage) =====
        const DB = {
            get(key) {
                try { return JSON.parse(localStorage.getItem('lezhe_' + key)) || null; } catch { return null; }
            },
            set(key, val) {
                localStorage.setItem('lezhe_' + key, JSON.stringify(val));
            },
            getSoftware() {
                return this.get('software') || [];
            },
            getCategories() {
                return this.get('categories') || ['设计工具', '开发工具', '办公软件', '媒体工具', '实用工具'];
            }
        };

        // ===== 初始化：如果 localStorage 中没有数据，则保持空，不填充任何示例 =====
        // 仅当 categories 不存在时设置默认分类（但不创建软件）
        if (!localStorage.getItem('lezhe_categories')) {
            DB.set('categories', ['设计工具', '开发工具', '办公软件', '媒体工具', '实用工具']);
        }
        // 软件数组默认为空，不自动填充

        // ===== 工具 =====
        function toast(msg, type = 'success') {
            const c = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.innerHTML = `<span class="icon">${type === 'success' ? '◆' : '✕'}</span> ${msg}`;
            c.appendChild(el);
            setTimeout(() => {
                el.style.animation = 'toastOut 0.4s ease forwards';
                setTimeout(() => el.remove(), 500);
            }, 2800);
        }

        function getIconEmoji(cat) {
            const map = { '设计工具': '✎', '开发工具': '⚙', '办公软件': '📋', '媒体工具': '🎬', '实用工具': '🔧' };
            return map[cat] || '📦';
        }

        function renderIcon(soft) {
            if (soft.iconUrl && soft.iconUrl.trim()) {
                return `<img src="${soft.iconUrl}" alt="${soft.name}" onerror="this.style.display='none';this.parentElement.textContent='${soft.icon || '📦'}" />`;
            }
            return soft.icon || '📦';
        }

        // ===== 分页状态 =====
        let currentPage = 1;
        const PAGE_SIZE = 6;
        let currentFilteredList = [];

        // ===== 渲染 =====
        const Render = {
            renderCategories(container, categories, active, onClick) {
                if (!container) return;
                const all = DB.getSoftware();
                container.innerHTML = categories.map(c => `
                    <div class="category-item ${c === active ? 'active' : ''}" data-cat="${c}">
                        <span class="icon">${getIconEmoji(c)}</span>
                        <span class="name">${c}</span>
                        <span class="count">${all.filter(s => s.category === c).length}</span>
                    </div>
                `).join('');
                container.querySelectorAll('.category-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const cat = el.dataset.cat;
                        if (onClick) onClick(cat);
                    });
                });
            },

            renderCards(container, list, showCategory = true) {
                if (!container) return;
                if (!list || list.length === 0) {
                    container.innerHTML =
                        `<div class="empty-state"><div class="icon">◆</div><h3>暂无软件</h3><p>等待新的资源加入</p></div>`;
                    return;
                }
                container.innerHTML = list.map(s => `
                    <div class="software-card card" data-id="${s.id}">
                        <div class="card-top">
                            <div class="card-icon">${renderIcon(s)}</div>
                            <div class="card-info">
                                <h3>${s.name}</h3>
                                <div class="meta">
                                    ${showCategory ? `<span>${s.category}</span>` : ''}
                                    <span class="version">v${s.version}</span>
                                    <span>${s.size || '—'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="desc">${s.description || ''}</div>
                        <div class="card-footer">
                            <div class="stats">
                                <span>👁 ${s.views || 0}</span>
                                <span>⬇ ${s.downloads || 0}</span>
                            </div>
                            <button class="btn btn-sm btn-primary detail-trigger" data-id="${s.id}">详情</button>
                        </div>
                    </div>
                `).join('');

                container.querySelectorAll('.detail-trigger').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        const soft = DB.getSoftware().find(s => s.id === id);
                        if (soft) Detail.open(soft);
                    });
                });
                container.querySelectorAll('.software-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const id = card.dataset.id;
                        const soft = DB.getSoftware().find(s => s.id === id);
                        if (soft) Detail.open(soft);
                    });
                });
            }
        };

        // ===== 详情弹窗 =====
        const Detail = {
            open(soft) {
                const overlay = document.getElementById('detailOverlay');
                const iconEl = document.getElementById('detailIcon');
                if (soft.iconUrl && soft.iconUrl.trim()) {
                    iconEl.innerHTML =
                        `<img src="${soft.iconUrl}" alt="${soft.name}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none';this.parentElement.textContent='${soft.icon || '📦'}" />`;
                } else {
                    iconEl.textContent = soft.icon || '📦';
                }
                document.getElementById('detailName').textContent = soft.name;
                document.getElementById('detailMeta').innerHTML = `
                    <span class="badge">${soft.category}</span>
                    <span class="badge badge-purple">v${soft.version}</span>
                    <span>${soft.size || '—'}</span>
                    <span>📅 ${soft.date || ''}</span>
                    <span>👁 ${soft.views || 0}</span>
                    <span>⬇ ${soft.downloads || 0}</span>
                `;
                document.getElementById('detailDesc').textContent = soft.detail || soft.description || '';
                const dlBtn = document.getElementById('detailDownload');
                dlBtn.textContent = '⬇ 下载';
                dlBtn.onclick = () => {
                    const list = DB.getSoftware();
                    const item = list.find(s => s.id === soft.id);
                    if (item) {
                        item.downloads = (item.downloads || 0) + 1;
                        DB.set('software', list);
                        toast('开始下载 ' + item.name, 'success');
                        const meta = document.getElementById('detailMeta');
                        const spans = meta.querySelectorAll('span');
                        if (spans.length >= 6) spans[5].textContent = '⬇ ' + item.downloads;
                        App.refreshAll();
                    }
                };
                overlay.classList.add('open');
                document.body.style.overflow = 'hidden';
            },
            close() {
                document.getElementById('detailOverlay').classList.remove('open');
                document.body.style.overflow = '';
            }
        };

        document.getElementById('detailClose').addEventListener('click', Detail.close);
        document.getElementById('detailCloseBtn').addEventListener('click', Detail.close);
        document.getElementById('detailOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) Detail.close();
        });

        // ===== 应用主控 =====
        const App = {
            currentPage: 'home',
            currentCategory: 'all',

            init() {
                document.querySelectorAll('.nav-links a[data-page]').forEach(a => {
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        const page = a.dataset.page;
                        if (page === 'home') this.goHome();
                        else if (page === 'list') this.goList();
                    });
                });
                document.getElementById('searchBtn').addEventListener('click', () => this.doSearch());
                document.getElementById('searchInput').addEventListener('keyup', (e) => {
                    if (e.key === 'Enter') this.doSearch();
                });
                document.getElementById('logoHome').addEventListener('click', (e) => {
                    e.preventDefault();
                    this.goHome();
                });
                document.getElementById('mobileToggle').addEventListener('click', () => {
                    document.getElementById('navLinks').classList.toggle('open');
                });

                // 分页按钮事件
                document.getElementById('prevPageBtn').addEventListener('click', () => {
                    if (currentPage > 1) {
                        currentPage--;
                        this.renderListPage();
                    }
                });
                document.getElementById('nextPageBtn').addEventListener('click', () => {
                    const totalPages = Math.ceil(currentFilteredList.length / PAGE_SIZE);
                    if (currentPage < totalPages) {
                        currentPage++;
                        this.renderListPage();
                    }
                });

                this.refreshAll();
            },

            goHome() {
                this.currentPage = 'home';
                document.getElementById('pageHome').classList.remove('hidden');
                document.getElementById('pageList').classList.add('hidden');
                document.querySelectorAll('.nav-links a[data-page]').forEach(a => a.classList.remove('active'));
                document.querySelector('.nav-links a[data-page="home"]').classList.add('active');
                document.getElementById('navLinks').classList.remove('open');
                this.refreshHome();
            },

            goList(cat = 'all') {
                this.currentPage = 'list';
                this.currentCategory = cat;
                document.getElementById('pageHome').classList.add('hidden');
                document.getElementById('pageList').classList.remove('hidden');
                document.querySelectorAll('.nav-links a[data-page]').forEach(a => a.classList.remove('active'));
                document.querySelector('.nav-links a[data-page="list"]').classList.add('active');
                document.getElementById('navLinks').classList.remove('open');
                // 重置分页到第一页
                currentPage = 1;
                this.refreshList();
            },

            doSearch() {
                const kw = document.getElementById('searchInput').value.trim();
                if (!kw) { this.goHome(); return; }
                this.currentPage = 'list';
                document.getElementById('pageHome').classList.add('hidden');
                document.getElementById('pageList').classList.remove('hidden');
                document.querySelectorAll('.nav-links a[data-page]').forEach(a => a.classList.remove('active'));
                document.querySelector('.nav-links a[data-page="list"]').classList.add('active');
                document.getElementById('navLinks').classList.remove('open');
                currentPage = 1;
                this.refreshList(kw);
            },

            refreshHome() {
                const all = DB.getSoftware();
                const cats = DB.getCategories();
                Render.renderCategories(
                    document.getElementById('categoryGridHome'),
                    cats,
                    null,
                    (cat) => { this.goList(cat); }
                );
                const recommend = all.filter(s => s.recommend).slice(0, 6);
                Render.renderCards(document.getElementById('recommendGrid'), recommend, true);
                const latest = [...all].sort((a, b) => (b.date || '').localeCompare(a.date || '')).slice(0, 6);
                Render.renderCards(document.getElementById('latestGrid'), latest, true);
            },

            refreshList(keyword) {
                const all = DB.getSoftware();
                let list = [...all];
                const cats = DB.getCategories();

                // 更新分类筛选标签
                const filterContainer = document.getElementById('filterTags');
                let filterHtml =
                    `<button class="btn btn-sm btn-outline active" data-cat="all">全部</button>`;
                cats.forEach(c => {
                    filterHtml +=
                        `<button class="btn btn-sm btn-outline" data-cat="${c}">${c}</button>`;
                });
                filterContainer.innerHTML = filterHtml;
                filterContainer.querySelectorAll('button').forEach(btn => {
                    btn.addEventListener('click', () => {
                        filterContainer.querySelectorAll('button').forEach(b => b.classList.remove(
                            'active'));
                        btn.classList.add('active');
                        const cat = btn.dataset.cat;
                        this.currentCategory = cat;
                        currentPage = 1;
                        this.refreshListWithFilters();
                    });
                });

                // 搜索过滤
                if (keyword) {
                    const kw = keyword.toLowerCase();
                    list = list.filter(s =>
                        s.name.toLowerCase().includes(kw) ||
                        (s.description || '').toLowerCase().includes(kw) ||
                        (s.detail || '').toLowerCase().includes(kw)
                    );
                    document.getElementById('listSub').textContent = `搜索结果: "${keyword}" (${list.length}项)`;
                } else {
                    document.getElementById('listSub').textContent = `全部软件 (${list.length}项)`;
                }

                // 分类过滤
                if (this.currentCategory !== 'all') {
                    list = list.filter(s => s.category === this.currentCategory);
                }

                // 保存过滤后的列表用于分页
                currentFilteredList = list;
                this.renderListPage();
            },

            renderListPage() {
                const total = currentFilteredList.length;
                const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
                if (currentPage > totalPages) currentPage = totalPages;
                const start = (currentPage - 1) * PAGE_SIZE;
                const end = Math.min(start + PAGE_SIZE, total);
                const pageItems = currentFilteredList.slice(start, end);

                Render.renderCards(document.getElementById('listGrid'), pageItems, true);

                // 更新分页控件
                document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${totalPages} 页`;
                document.getElementById('prevPageBtn').disabled = (currentPage <= 1);
                document.getElementById('nextPageBtn').disabled = (currentPage >= totalPages);
            },

            refreshListWithFilters() {
                const kw = document.getElementById('searchInput').value.trim();
                if (kw) { this.refreshList(kw); } else { this.refreshList(null); }
            },

            refreshAll() {
                if (this.currentPage === 'home') this.refreshHome();
                else if (this.currentPage === 'list') this.refreshListWithFilters();
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            App.init();
            document.addEventListener('click', (e) => {
                const nav = document.getElementById('navLinks');
                if (nav.classList.contains('open') && !e.target.closest('.header')) {
                    nav.classList.remove('open');
                }
            });
        });

        window.__APP = App;
        window.__DB = DB;
    </script>
</body>
</html>
