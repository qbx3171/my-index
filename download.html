<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>乐哲软件 · 构建数字未来</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2">
    </script>
    <script>
        (function() {
            var bp = document.createElement('script');
            var curProtocol = window.location.protocol.split(':')[0];
            if (curProtocol === 'https') {
                bp.src = 'https://zz.bdstatic.com/linksubmit/push.js';
            } else {
                bp.src = 'http://push.zhanzhang.baidu.com/push.js';
            }
            var s = document.getElementsByTagName('script')[0];
            s.parentNode.insertBefore(bp, s);
        })();
    </script>
    <style>
        :root {
            --bg-primary: #f0f4fa;
            --bg-secondary: #e6ecf5;
            --bg-card: rgba(255, 255, 255, 0.72);
            --bg-card-solid: #ffffff;
            --border-glow: rgba(0, 120, 255, 0.18);
            --border-glow-strong: rgba(0, 120, 255, 0.35);
            --text-primary: #0f1a2e;
            --text-secondary: #3d5068;
            --text-dim: #7a8ca3;
            --accent-cyan: #0077ff;
            --accent-blue: #0055cc;
            --accent-purple: #6c5ce7;
            --accent-gradient: linear-gradient(135deg, #0077ff, #6c5ce7);
            --shadow-card: 0 8px 32px rgba(0, 20, 40, 0.08);
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: 0.3s cubic-bezier(0.2, 0, 0, 1);
            --font: 'Inter', -apple-system, sans-serif;
            --max-width: 1200px;
            --header-height: 64px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 2px;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none;
            color: inherit;
        }
        input {
            font-family: inherit;
            border: none;
            outline: none;
            background: none;
            color: var(--text-primary);
        }
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }
        .hidden {
            display: none !important;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
            border: 1px solid transparent;
            background: var(--bg-card);
            color: var(--text-primary);
            backdrop-filter: blur(8px);
            border-color: var(--border-glow);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 136, 255, 0.15);
            border-color: var(--accent-cyan);
        }
        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            border-color: transparent;
            font-weight: 700;
        }
        .btn-primary:hover {
            box-shadow: 0 4px 24px rgba(0, 136, 255, 0.3);
            transform: translateY(-2px) scale(1.02);
        }
        .btn-outline {
            background: transparent;
            border-color: var(--border-glow);
            color: var(--text-secondary);
        }
        .btn-outline:hover {
            background: rgba(0, 136, 255, 0.06);
            border-color: var(--accent-cyan);
            color: var(--text-primary);
        }
        .btn-sm {
            padding: 6px 18px;
            font-size: 0.8rem;
        }
        .btn-icon {
            padding: 8px 12px;
            border-radius: 50px;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            backdrop-filter: blur(4px);
            transition: var(--transition);
            font-size: 1rem;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-icon:hover {
            background: var(--accent-gradient);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 2px 12px rgba(0, 136, 255, 0.25);
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card);
            transition: var(--transition);
            overflow: hidden;
        }
        .card:hover {
            border-color: var(--border-glow-strong);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            transform: translateY(-4px);
        }

        .badge {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(0, 136, 255, 0.10);
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 136, 255, 0.15);
            line-height: 1.6;
        }
        .badge i {
            margin-right: 4px;
        }
        .badge-mac {
            background: rgba(108, 92, 231, 0.10);
            color: #6c5ce7;
            border-color: rgba(108, 92, 231, 0.15);
        }
        .badge-windows {
            background: rgba(0, 136, 255, 0.10);
            color: var(--accent-cyan);
            border-color: rgba(0, 136, 255, 0.15);
        }
        .badge-purple {
            background: rgba(108, 92, 231, 0.10);
            color: var(--accent-purple);
            border-color: rgba(108, 92, 231, 0.15);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(240, 244, 250, 0.82);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border-glow);
            height: var(--header-height);
            box-shadow: 0 2px 12px rgba(0,0,0,0.02);
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--header-height);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            flex-shrink: 0;
        }
        .logo .mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: var(--accent-gradient);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 800;
            box-shadow: 0 2px 12px rgba(0, 136, 255, 0.25);
        }
        .logo span {
            font-weight: 300;
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-left: 4px;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
            list-style: none;
        }
        .nav-links a {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            padding: 8px 16px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .nav-links a i {
            font-size: 1rem;
        }
        .nav-links a:hover {
            background: rgba(0, 136, 255, 0.08);
            color: var(--text-primary);
        }
        .nav-links a.active {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 2px 12px rgba(0, 136, 255, 0.25);
        }
        .nav-links a.active:hover {
            filter: brightness(1.05);
        }
        .nav-links a::after {
            display: none;
        }

        .mobile-toggle {
            display: none;
            font-size: 1.6rem;
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            background: rgba(0, 0, 0, 0.02);
            line-height: 1;
            transition: var(--transition);
        }
        .mobile-toggle:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        .hero {
            padding: 50px 0 32px;
            text-align: center;
            position: relative;
        }
        .hero::before {
            content: '◆';
            position: absolute;
            right: 5%;
            top: 10%;
            font-size: 120px;
            opacity: 0.06;
            color: var(--accent-cyan);
            transform: rotate(10deg);
            font-weight: 100;
            pointer-events: none;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .hero h1 .highlight {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 1rem;
            color: var(--text-secondary);
            max-width: 480px;
            margin: 0 auto 28px;
            font-weight: 300;
        }
        .hero .search-box {
            display: flex;
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: var(--transition);
        }
        .hero .search-box:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: 0 4px 24px rgba(0, 136, 255, 0.08);
        }
        .hero .search-box input {
            flex: 1;
            padding: 12px 22px;
            font-size: 0.9rem;
            background: transparent;
            color: var(--text-primary);
            min-width: 0;
        }
        .hero .search-box input::placeholder {
            color: var(--text-dim);
        }
        .hero .search-box button {
            padding: 0 24px;
            background: var(--accent-gradient);
            color: #fff;
            font-weight: 700;
            transition: var(--transition);
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .hero .search-box button:hover {
            filter: brightness(1.05);
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.2);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }
        .section-sub {
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        /* ===== 分类导航 - 横向滚动容器 ===== */
        .categories-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 4px;
            margin: 20px 0 12px;
        }
        .categories-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
            flex: 1;
            padding: 4px 0;
        }
        .categories-scroll::-webkit-scrollbar {
            display: none;
        }
        .categories-grid {
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            padding: 0 4px;
            width: max-content;
        }
        .category-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            transition: var(--transition);
            cursor: pointer;
            user-select: none;
            font-size: 0.8rem;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            flex-shrink: 0;
        }
        .category-item .icon {
            font-size: 16px;
            line-height: 1;
        }
        .category-item .name {
            font-weight: 500;
        }
        .category-item .count {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-left: 2px;
        }
        .category-item:hover {
            background: rgba(0, 136, 255, 0.08);
            border-color: var(--accent-cyan);
            transform: translateY(-2px);
        }
        .category-item.active {
            background: var(--accent-gradient);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 2px 12px rgba(0, 136, 255, 0.25);
        }
        .category-item.active .count {
            color: rgba(255,255,255,0.7);
        }

        .categories-nav-btn {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-card-solid);
            border: 1px solid var(--border-glow);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: var(--text-secondary);
            box-shadow: var(--shadow-card);
            font-size: 0.9rem;
            z-index: 2;
        }
        .categories-nav-btn:hover {
            background: var(--accent-gradient);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 2px 12px rgba(0, 136, 255, 0.25);
        }
        .categories-nav-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .software-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 22px;
            margin-top: 6px;
        }
        .software-card {
            padding: 22px 20px 18px;
            transition: var(--transition);
            cursor: default;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card);
            min-height: 270px;
        }
        .software-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-glow-strong);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }
        .software-card .card-top {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 10px;
        }
        .software-card .card-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            background: rgba(0, 136, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid rgba(0, 136, 255, 0.08);
            overflow: hidden;
            font-size: 26px;
        }
        .software-card .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .software-card .card-info {
            flex: 1;
            min-width: 0;
        }
        .software-card .card-info h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2px;
            letter-spacing: -0.2px;
            color: var(--text-primary);
            word-break: break-word;
        }
        .software-card .card-info .meta {
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .software-card .card-info .meta .version {
            color: var(--accent-cyan);
        }
        .software-card .card-info .platform-badges {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .software-card .card-info .platform-badges .badge {
            font-size: 0.65rem;
            padding: 2px 12px;
        }
        .software-card .desc {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin: 8px 0 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }
        .software-card .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid var(--border-glow);
            padding-top: 12px;
            margin-top: 2px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .software-card .card-footer .stats {
            font-size: 0.7rem;
            color: var(--text-dim);
            display: flex;
            gap: 14px;
        }
        .software-card .card-footer .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .software-card .card-footer .btn {
            padding: 4px 16px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 28px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 8px 20px;
            border-radius: 50px;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            font-weight: 500;
            transition: var(--transition);
            color: var(--text-secondary);
        }
        .pagination button:hover:not(:disabled) {
            border-color: var(--accent-cyan);
            color: var(--text-primary);
            background: rgba(0, 136, 255, 0.04);
        }
        .pagination button.active {
            background: var(--accent-cyan);
            color: #fff;
            border-color: var(--accent-cyan);
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination .page-info {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .detail-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.30);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        .detail-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        .detail-modal {
            max-width: 620px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px 36px 28px;
            background: var(--bg-card-solid);
            backdrop-filter: blur(32px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-glow-strong);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.12);
            transform: scale(0.96) translateY(20px);
            transition: var(--transition);
        }
        .detail-overlay.open .detail-modal {
            transform: scale(1) translateY(0);
        }
        .detail-modal .close-btn {
            float: right;
            font-size: 1.5rem;
            color: var(--text-dim);
            transition: var(--transition);
            line-height: 1;
            padding: 4px;
        }
        .detail-modal .close-btn:hover {
            color: var(--text-primary);
            transform: rotate(90deg);
        }
        .detail-modal .detail-icon {
            font-size: 48px;
            margin-bottom: 6px;
            width: 64px;
            height: 64px;
            border-radius: var(--radius-md);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 136, 255, 0.06);
            border: 1px solid rgba(0, 136, 255, 0.08);
        }
        .detail-modal .detail-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .detail-modal h2 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-top: 6px;
            color: var(--text-primary);
        }
        .detail-modal .detail-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin: 6px 0 14px;
            align-items: center;
        }
        .detail-modal .detail-platforms {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .detail-modal .detail-platforms .badge {
            font-size: 0.75rem;
            padding: 4px 14px;
        }
        .detail-modal .detail-desc {
            font-size: 0.9rem;
            line-height: 1.8;
            color: var(--text-secondary);
            margin: 14px 0 22px;
            white-space: pre-wrap;
            background: var(--bg-primary);
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--accent-cyan);
        }
        .detail-modal .detail-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .detail-modal .detail-actions .btn {
            flex: 1;
            min-width: 120px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }
        .toolbar .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .toolbar .filters .btn {
            padding: 4px 16px;
            font-size: 0.75rem;
        }
        .toolbar .sort-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .toolbar .sort-group label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .toolbar .sort-group select {
            padding: 4px 12px;
            border-radius: 50px;
            border: 1px solid var(--border-glow);
            background: var(--bg-card);
            font-size: 0.75rem;
            color: var(--text-primary);
            outline: none;
            cursor: pointer;
        }
        .toolbar .sort-group select:focus {
            border-color: var(--accent-cyan);
        }

        .footer {
            padding: 32px 0 24px;
            border-top: 1px solid var(--border-glow);
            margin-top: 32px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        .footer .brand {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        .footer .copyright {
            margin-top: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .footer .copyright a {
            color: var(--accent-cyan);

        .footer .legal {

            margin-left: auto;
            margin-right: auto;

            opacity: 0.8;
        }

        .toast-container {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 340px;
            pointer-events: none;
        }
        .toast {
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            background: var(--bg-card-solid);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow-strong);
            box-shadow: var(--shadow-card);
            font-size: 0.85rem;
            color: var(--text-primary);
            transform: translateX(120%);
            animation: toastIn 0.4s ease forwards;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }
        .toast.success .icon {
            color: var(--accent-cyan);
        }
        .toast.error .icon {
            color: #e74c3c;
        }
        .toast .icon {
            font-size: 1.1rem;
        }
        @keyframes toastIn {
            to {
                transform: translateX(0);
            }
        }
        @keyframes toastOut {
            to {
                transform: translateX(120%);
                opacity: 0;
            }
        }

        .divider-cyber {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin: 10px 0 16px;
            color: var(--text-dim);
            font-size: 0.65rem;
            letter-spacing: 4px;
            font-weight: 300;
        }
        .divider-cyber::before,
        .divider-cyber::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
        }
        .divider-cyber .dot {
            font-size: 0.35rem;
            color: var(--accent-cyan);
        }

        .back-top {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 50;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-card-solid);
            border: 1px solid var(--border-glow-strong);
            box-shadow: var(--shadow-card);
            color: var(--text-secondary);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
        }
        .back-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .back-top:hover {
            background: var(--accent-gradient);
            color: #fff;
            border-color: transparent;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            :root {
                --header-height: 58px;
            }
            .nav-links {
                display: none;
                position: absolute;
                top: var(--header-height);
                left: 0;
                right: 0;
                background: rgba(240, 244, 250, 0.96);
                backdrop-filter: blur(24px);
                flex-direction: column;
                padding: 16px 24px;
                gap: 14px;
                border-bottom: 1px solid var(--border-glow);
                box-shadow: var(--shadow-card);
            }
            .nav-links.open {
                display: flex;
            }
            .mobile-toggle {
                display: block;
            }
            .hero h1 {
                font-size: 2rem;
            }
            .hero p {
                font-size: 0.9rem;
            }
            .software-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 16px;
            }
            .category-item {
                padding: 4px 12px;
                font-size: 0.75rem;
                gap: 4px;
            }
            .category-item .icon {
                font-size: 14px;
            }
            .hero .search-box input {
                padding: 10px 16px;
                font-size: 0.85rem;
            }
            .hero .search-box button {
                padding: 0 16px;
                font-size: 0.8rem;
            }
            .pagination button {
                padding: 6px 14px;
                font-size: 0.8rem;
            }
            .detail-modal {
                padding: 24px 20px 20px;
            }
            .detail-modal h2 {
                font-size: 1.3rem;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .toolbar .filters {
                justify-content: center;
            }
            .toolbar .sort-group {
                justify-content: center;
            }
            .back-top {
                bottom: 20px;
                left: 20px;
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
            .categories-nav-btn {
                width: 28px;
                height: 28px;
                font-size: 0.8rem;
            }
        }
        @media (max-width: 480px) {
            .hero h1 {
                font-size: 1.6rem;
            }
            .software-grid {
                grid-template-columns: 1fr;
            }
            .categories-grid {
                gap: 6px;
            }
            .category-item {
                padding: 3px 10px;
                font-size: 0.7rem;
            }
            .category-item .icon {
                font-size: 12px;
            }
            .container {
                padding: 0 16px;
            }
            .footer .copyright {
                font-size: 0.7rem;
            }
        }
        .category-item:active,
        .software-card:active,
        .btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-modal" id="detailModal">
            <button class="close-btn" id="detailClose">✕</button>
            <div class="detail-icon" id="detailIcon">📦</div>
            <h2 id="detailName">软件名称</h2>
            <div class="detail-meta" id="detailMeta"></div>

            <div class="detail-actions">
                <button class="btn btn-primary" id="detailDownload"><i class="fas fa-download"></i> 下载</button>
                <button class="btn btn-outline" id="detailCloseBtn">关闭</button>

    </div>

    <script>
        var SUPABASE_URL = 'https://qqcxtfayjxyvswblmdpw.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable__KOJGRcvoRGC3QiHNg7_qA_-9yGsnCW';
        if (typeof supabase === 'undefined') {
            console.error('Supabase library not loaded.');
        }
        var supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ===== 数据缓存 =====
        var cache = {
            software: [],
            categories: [],
            loaded: false
        };

        // ===== 数据层 =====
        var DB = {
            async loadAll() {
                if (cache.loaded) return Promise.resolve();
                try {
                    var [softRes, catRes] = await Promise.all([
                        supabaseClient.from('software').select('*').order('created_at', { ascending: false }),
                        supabaseClient.from('categories').select('name').order('name')
                    ]);
                    if (softRes.error) throw softRes.error;
                    if (catRes.error) throw catRes.error;
                    cache.software = softRes.data || [];
                    cache.categories = catRes.data.map(function(item) { return item.name; }) || ['设计工具', '开发工具', '办公软件', '媒体工具', '实用工具'];
                    cache.loaded = true;
                    return Promise.resolve();
                } catch (e) {
                    console.error('加载数据失败:', e);
                    // 降级
                    cache.software = [];
                    cache.categories = ['设计工具', '开发工具', '办公软件', '媒体工具', '实用工具'];
                    cache.loaded = true;
                    return Promise.resolve();
                }
            },
            getSoftware() {
                return cache.software;
            },
            getCategories() {
                return cache.categories;
            },
            async updateSoftware(soft) {
                try {
                    await supabaseClient.from('software').update({ views: soft.views, downloads: soft.downloads }).eq('id', soft.id);
                    // 更新缓存
                    var idx = cache.software.findIndex(function(s) { return s.id === soft.id; });
                    if (idx !== -1) {
                        cache.software[idx].views = soft.views;
                        cache.software[idx].downloads = soft.downloads;
                    }
                } catch (e) {
                    console.error('更新软件异常:', e);
                }
            }
        };

        // ===== 工具函数 =====
        function toast(msg, type) {
            type = type || 'success';
            var c = document.getElementById('toastContainer');
            var el = document.createElement('div');
            el.className = 'toast ' + type;
            el.innerHTML = '<span class="icon">' + (type === 'success' ? '◆' : '✕') + '</span> ' + msg;
            c.appendChild(el);
            setTimeout(function() {
                el.style.animation = 'toastOut 0.4s ease forwards';
                setTimeout(function() { el.remove(); }, 500);
            }, 2800);
        }

        function getIconEmoji(cat) {
            var map = { '设计工具': '✎', '开发工具': '⚙', '办公软件': '📋', '媒体工具': '🎬', '实用工具': '🔧' };
            return map[cat] || '📦';
        }

        function renderIcon(soft) {
            if (soft.icon_url && soft.icon_url.trim()) {
                return '<img src="' + soft.icon_url + '" alt="' + soft.name + '" onerror="this.style.display=\'none\';this.parentElement.textContent=\'' + (soft.icon || '📦') + '\'" />';
            }
            return soft.icon || '📦';
        }

        function renderPlatformBadges(soft) {
            var html = '';
            var platforms = soft.platforms || [];
            if (platforms.indexOf('mac') !== -1) {
                html += '<span class="badge badge-mac"><i class="fab fa-apple"></i> Mac</span>';
            }
            if (platforms.indexOf('windows') !== -1) {
                html += '<span class="badge badge-windows"><i class="fab fa-windows"></i> Windows</span>';
            }
            return html;
        }

        function highlightText(text, keyword) {
            if (!keyword) return text;
            var regex = new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
            return text.replace(regex, '<mark style="background:rgba(0,136,255,0.2);border-radius:4px;padding:0 2px;">$1</mark>');
        }

        // ===== 分页状态 =====
        var currentPage = 1;
        var PAGE_SIZE = 6;
        var currentFilteredList = [];

        // ===== 渲染引擎（只使用缓存数据） =====
        var Render = {
            renderCategories: function(container, active, onClick) {
                if (!container) return;
                var categories = DB.getCategories();
                var all = DB.getSoftware();
                container.innerHTML = categories.map(function(c) {
                    var count = all.filter(function(s) { return s.category === c; }).length;
                    return '<div class="category-item ' + (c === active ? 'active' : '') + '" data-cat="' + c + '"><span class="icon">' + getIconEmoji(c) + '</span><span class="name">' + c + '</span><span class="count">' + count + '</span></div>';
                }).join('');
                container.querySelectorAll('.category-item').forEach(function(el) {
                    el.addEventListener('click', function() {
                        var cat = this.dataset.cat;
                        if (onClick) onClick(cat);
                    });
                });
                // 更新滚动按钮状态
                updateNavButtons();
            },
            renderCards: function(container, list, showCategory, keyword) {
                showCategory = (showCategory !== undefined) ? showCategory : true;
                if (!container) return;
                if (!list || list.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">◆</div><h3>暂无软件</h3><p>等待新的资源加入</p></div>';
                    return;
                }
                var html = '';
                for (var i = 0; i < list.length; i++) {
                    var s = list[i];
                    var displayName = keyword ? highlightText(s.name, keyword) : s.name;
                    var displayDesc = keyword ? highlightText(s.description || '', keyword) : (s.description || '');
                    html += '<div class="software-card card" data-id="' + s.id + '"><div class="card-top"><div class="card-icon">' + renderIcon(s) + '</div><div class="card-info"><h3>' + displayName + '</h3><div class="meta">' + (showCategory ? '<span>' + s.category + '</span>' : '') + '<span class="version">v' + s.version + '</span><span>' + (s.size || '—') + '</span></div><div class="platform-badges">' + renderPlatformBadges(s) + '</div></div></div><div class="desc">' + displayDesc + '</div><div class="card-footer"><div class="stats"><span><i class="far fa-eye"></i> ' + (s.views || 0) + '</span><span><i class="fas fa-download"></i> ' + (s.downloads || 0) + '</span></div><button class="btn btn-sm btn-primary detail-trigger" data-id="' + s.id + '">详情</button></div></div>';
                }
                container.innerHTML = html;
                container.querySelectorAll('.detail-trigger').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var id = this.dataset.id;
                        var soft = DB.getSoftware().find(function(s) { return s.id === id; });
                        if (soft) Detail.open(soft);
                    });
                });
                container.querySelectorAll('.software-card').forEach(function(card) {
                    card.addEventListener('click', function() {
                        var id = this.dataset.id;
                        var soft = DB.getSoftware().find(function(s) { return s.id === id; });
                        if (soft) Detail.open(soft);
                    });
                });
            }
        };

        // ===== 分类滚动控制 =====
        var scrollContainer = document.getElementById('categoriesScroll');
        var catPrevBtn = document.getElementById('catPrevBtn');
        var catNextBtn = document.getElementById('catNextBtn');

        function updateNavButtons() {
            if (!scrollContainer) return;
            var scrollLeft = scrollContainer.scrollLeft;
            var maxScroll = scrollContainer.scrollWidth - scrollContainer.clientWidth;
            catPrevBtn.disabled = scrollLeft <= 1;
            catNextBtn.disabled = maxScroll <= 1 || scrollLeft >= maxScroll - 1;
        }

        if (scrollContainer) {
            scrollContainer.addEventListener('scroll', updateNavButtons);
            window.addEventListener('resize', updateNavButtons);
            catPrevBtn.addEventListener('click', function() {
                scrollContainer.scrollBy({ left: -200, behavior: 'smooth' });
            });
            catNextBtn.addEventListener('click', function() {
                scrollContainer.scrollBy({ left: 200, behavior: 'smooth' });
            });
        }

        // ===== 详情弹窗 =====
        var Detail = {
            open: function(soft) {
                var overlay = document.getElementById('detailOverlay');
                var iconEl = document.getElementById('detailIcon');
                if (soft.icon_url && soft.icon_url.trim()) {
                    iconEl.innerHTML = '<img src="' + soft.icon_url + '" alt="' + soft.name + '" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display=\'none\';this.parentElement.textContent=\'' + (soft.icon || '📦') + '\'" />';
                } else {
                    iconEl.textContent = soft.icon || '📦';
                }
                document.getElementById('detailName').textContent = soft.name;
                document.getElementById('detailMeta').innerHTML = '<span class="badge">' + soft.category + '</span><span class="badge badge-purple">v' + soft.version + '</span><span>' + (soft.size || '—') + '</span><span>📅 ' + (soft.date || '') + '</span><span><i class="far fa-eye"></i> ' + (soft.views || 0) + '</span><span><i class="fas fa-download"></i> ' + (soft.downloads || 0) + '</span><div class="detail-platforms">' + renderPlatformBadges(soft) + '</div>';
                document.getElementById('detailDesc').textContent = soft.detail || soft.description || '';
                var dlBtn = document.getElementById('detailDownload');
                dlBtn.innerHTML = '<i class="fas fa-download"></i> 下载';
                dlBtn.onclick = function() {
                    if (soft.download_url && soft.download_url.trim() !== '') {
                        window.open(soft.download_url, '_blank');
                        soft.downloads = (soft.downloads || 0) + 1;
                        DB.updateSoftware(soft);
                        toast('开始下载 ' + soft.name, 'success');
                        var meta = document.getElementById('detailMeta');
                        var spans = meta.querySelectorAll('span');
                        if (spans.length >= 6) spans[5].innerHTML = '<i class="fas fa-download"></i> ' + soft.downloads;
                        App.refreshAll();
                    } else {
                        soft.downloads = (soft.downloads || 0) + 1;
                        DB.updateSoftware(soft);
                        toast('暂无下载链接，已记录下载意向', 'error');
                        var meta = document.getElementById('detailMeta');
                        var spans = meta.querySelectorAll('span');
                        if (spans.length >= 6) spans[5].innerHTML = '<i class="fas fa-download"></i> ' + soft.downloads;
                        App.refreshAll();
                    }
                };
                overlay.classList.add('open');
                document.body.style.overflow = 'hidden';
            },
            close: function() {
                document.getElementById('detailOverlay').classList.remove('open');
                document.body.style.overflow = '';
            }
        };

        document.getElementById('detailClose').addEventListener('click', Detail.close);
        document.getElementById('detailCloseBtn').addEventListener('click', Detail.close);
        document.getElementById('detailOverlay').addEventListener('click', function(e) {
            if (e.target === e.currentTarget) Detail.close();
        });

        // ===== 应用主控 =====
        var App = {
            currentPage: 'home',
            currentCategory: 'all',
            sortBy: 'date',
            searchKeyword: '',
            init: function() {
                var self = this;
                // 加载数据
                DB.loadAll().then(function() {
                    self.refreshAll();
                });

                // 事件绑定
                document.querySelectorAll('.nav-links a[data-page]').forEach(function(a) {
                    a.addEventListener('click', function(e) {
                        e.preventDefault();
                        var page = this.dataset.page;
                        if (page === 'home') self.goHome();
                        else if (page === 'list') self.goList();
                    });
                });
                document.getElementById('searchBtn').addEventListener('click', function() { self.doSearch(); });
                document.getElementById('searchInput').addEventListener('keyup', function(e) {
                    if (e.key === 'Enter') self.doSearch();
                });
                document.getElementById('logoHome').addEventListener('click', function(e) {
                    e.preventDefault();
                    self.goHome();
                });
                document.getElementById('mobileToggle').addEventListener('click', function() {
                    document.getElementById('navLinks').classList.toggle('open');
                });
                document.getElementById('prevPageBtn').addEventListener('click', function() {
                    if (currentPage > 1) {
                        currentPage--;
                        self.renderListPage();
                    }
                });
                document.getElementById('nextPageBtn').addEventListener('click', function() {
                    var totalPages = Math.ceil(currentFilteredList.length / PAGE_SIZE);
                    if (currentPage < totalPages) {
                        currentPage++;
                        self.renderListPage();
                    }
                });
                document.getElementById('sortSelect').addEventListener('change', function() {
                    self.sortBy = this.value;
                    currentPage = 1;
                    self.refreshListWithFilters();
                });

                var backBtn = document.getElementById('backTopBtn');
                window.addEventListener('scroll', function() {
                    if (window.pageYOffset > 300) {
                        backBtn.classList.add('visible');
                    } else {
                        backBtn.classList.remove('visible');
                    }
                });
                backBtn.addEventListener('click', function() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            },
            goHome: function() {
                this.currentPage = 'home';
                document.getElementById('pageHome').classList.remove('hidden');
                document.getElementById('pageList').classList.add('hidden');
                document.querySelectorAll('.nav-links a[data-page]').forEach(function(a) { a.classList.remove('active'); });
                document.querySelector('.nav-links a[data-page="home"]').classList.add('active');
                document.getElementById('navLinks').classList.remove('open');
                this.refreshHome();
            },
            goList: function(cat) {
                cat = cat || 'all';
                this.currentPage = 'list';
                this.currentCategory = cat;
                document.getElementById('pageHome').classList.add('hidden');
                document.getElementById('pageList').classList.remove('hidden');
                document.querySelectorAll('.nav-links a[data-page]').forEach(function(a) { a.classList.remove('active'); });
                document.querySelector('.nav-links a[data-page="list"]').classList.add('active');
                document.getElementById('navLinks').classList.remove('open');
                currentPage = 1;
                this.refreshList();
            },
            doSearch: function() {
                var kw = document.getElementById('searchInput').value.trim();
                if (!kw) { this.goHome(); return; }
                this.searchKeyword = kw;
                this.currentPage = 'list';
                document.getElementById('pageHome').classList.add('hidden');
                document.getElementById('pageList').classList.remove('hidden');
                document.querySelectorAll('.nav-links a[data-page]').forEach(function(a) { a.classList.remove('active'); });
                document.querySelector('.nav-links a[data-page="list"]').classList.add('active');
                document.getElementById('navLinks').classList.remove('open');
                currentPage = 1;
                this.refreshList(kw);
            },
            refreshHome: function() {
                var self = this;
                var all = DB.getSoftware();
                var cats = DB.getCategories();
                Render.renderCategories(document.getElementById('categoryGridHome'), null, function(cat) { self.goList(cat); });
                var recommend = all.filter(function(s) { return s.recommend; }).slice(0, 6);
                Render.renderCards(document.getElementById('recommendGrid'), recommend, true);
                var latest = all.slice().sort(function(a, b) {
                    return (b.date || '').localeCompare(a.date || '');
                }).slice(0, 6);
                Render.renderCards(document.getElementById('latestGrid'), latest, true);
                // 确保滚动按钮状态
                setTimeout(updateNavButtons, 100);
            },
            refreshList: function(keyword) {
                var self = this;
                var all = DB.getSoftware();
                var list = all.slice();
                var cats = DB.getCategories();

                // 渲染分类筛选按钮
                var filterContainer = document.getElementById('filterTags');
                var filterHtml = '<button class="btn btn-sm btn-outline active" data-cat="all">全部</button>';
                cats.forEach(function(c) {
                    filterHtml += '<button class="btn btn-sm btn-outline" data-cat="' + c + '">' + c + '</button>';
                });
                filterContainer.innerHTML = filterHtml;
                filterContainer.querySelectorAll('button').forEach(function(btn) {
                    if (btn.dataset.cat === self.currentCategory) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                    btn.addEventListener('click', function() {
                        filterContainer.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
                        btn.classList.add('active');
                        var cat = btn.dataset.cat;
                        self.currentCategory = cat;
                        currentPage = 1;
                        self.refreshListWithFilters();
                    });
                });

                if (keyword) {
                    var kw = keyword.toLowerCase();
                    list = list.filter(function(s) {
                        return s.name.toLowerCase().includes(kw) ||
                            (s.description || '').toLowerCase().includes(kw) ||
                            (s.detail || '').toLowerCase().includes(kw);
                    });
                    document.getElementById('listSub').textContent = '搜索结果: "' + keyword + '" (' + list.length + '项)';
                } else {
                    document.getElementById('listSub').textContent = '全部软件 (' + list.length + '项)';
                }
                if (self.currentCategory !== 'all') {
                    list = list.filter(function(s) { return s.category === self.currentCategory; });
                }
                if (self.sortBy === 'views') {
                    list.sort(function(a, b) { return (b.views || 0) - (a.views || 0); });
                } else if (self.sortBy === 'downloads') {
                    list.sort(function(a, b) { return (b.downloads || 0) - (a.downloads || 0); });
                } else {
                    list.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
                }
                currentFilteredList = list;
                self.renderListPage(keyword);
            },
            renderListPage: function(keyword) {
                var total = currentFilteredList.length;
                var totalPages = Math.ceil(total / PAGE_SIZE) || 1;
                if (currentPage > totalPages) currentPage = totalPages;
                var start = (currentPage - 1) * PAGE_SIZE;
                var end = Math.min(start + PAGE_SIZE, total);
                var pageItems = currentFilteredList.slice(start, end);

                Render.renderCards(document.getElementById('listGrid'), pageItems, true, keyword || this.searchKeyword);

                document.getElementById('pageInfo').textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页';
                document.getElementById('prevPageBtn').disabled = (currentPage <= 1);
                document.getElementById('nextPageBtn').disabled = (currentPage >= totalPages);
            },
            refreshListWithFilters: function() {
                var kw = document.getElementById('searchInput').value.trim();
                this.searchKeyword = kw;
                if (kw) { this.refreshList(kw); } else { this.refreshList(null); }
            },
            refreshAll: function() {
                if (this.currentPage === 'home') this.refreshHome();
                else if (this.currentPage === 'list') this.refreshListWithFilters();
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            App.init();
            document.addEventListener('click', function(e) {
                var nav = document.getElementById('navLinks');
                if (nav.classList.contains('open') && !e.target.closest('.header')) {
                    nav.classList.remove('open');
                }
            });
        });
        window.__APP = App;
        window.__DB = DB;
    </script>
</body>
</html>
