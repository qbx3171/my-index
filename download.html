<body>
    <canvas id="particles-canvas"></canvas>
    <div class="app-wrapper">
        <!-- 导航栏、主内容、侧边栏等 HTML 结构保持不变 -->

    <!-- 模态框... -->

    <script>
        emailjs.init('9VF7tzRthx9_nkchu');

        window.copyText = function(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast('复制成功！', 'success')).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        };
        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); showToast('复制成功！', 'success'); } catch(e) { showToast('复制失败，请手动复制', 'error'); }
            document.body.removeChild(ta);
        }

        (function(){
            /* 粒子动画、配置、变量声明等保持原样 */

            const DEFAULT_MONTHLY_QUOTA = 2; // 基础配额

            /* ========= 下载次数管理（核心修改） ========= */
            function getCurrentMonthKey() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth()+1}`; }

            function getUserDownloadData(email) {
                const key = `download_${email}`;
                const data = localStorage.getItem(key);
                if (!data) return { month: getCurrentMonthKey(), count: 0, extra: 0 };
                try {
                    const parsed = JSON.parse(data);
                    if (parsed.month !== getCurrentMonthKey()) return { month: getCurrentMonthKey(), count: 0, extra: 0 };
                    return {
                        month: parsed.month,
                        count: parsed.count || 0,
                        extra: parsed.extra || 0   // 额外配额
                    };
                } catch (e) {
                    return { month: getCurrentMonthKey(), count: 0, extra: 0 };
                }
            }

            function saveUserDownloadData(email, count, extra = 0) {
                localStorage.setItem(`download_${email}`, JSON.stringify({
                    month: getCurrentMonthKey(),
                    count: count,
                    extra: extra
                }));
                // 同步到Airtable（可选）
                if (!isLocalFile) {
                    airReq('GET', `Users?filterByFormula={Email}="${encodeURIComponent(email)}"`)
                        .then(data => {
                            if (data.records.length) {
                                airReq('PATCH', `Users/${data.records[0].id}`, {
                                    fields: { DownloadCount: count, ExtraQuota: extra }
                                });
                            }
                        }).catch(() => {});
                }
            }

            // 增加额外配额（管理员加次数、签到、邀请）
            function addDownloadBonus(email, bonus) {
                const data = getUserDownloadData(email);
                const newExtra = Math.max(0, data.extra + bonus);
                saveUserDownloadData(email, data.count, newExtra);
            }

            function getRemainingCount(user) {
                if (!user) return 0;
                if (user.role === 'vip' || user.role === 'admin') return Infinity;
                const data = getUserDownloadData(user.email);
                const total = DEFAULT_MONTHLY_QUOTA + (data.extra || 0);
                return Math.max(0, total - data.count);
            }

            function canDownload(user) {
                if (!user) return false;
                if (user.role === 'vip' || user.role === 'admin') return true;
                const data = getUserDownloadData(user.email);
                const total = DEFAULT_MONTHLY_QUOTA + (data.extra || 0);
                return data.count < total;
            }

            function recordDownload(user) {
                if (!user || user.role === 'vip' || user.role === 'admin') return true;
                const data = getUserDownloadData(user.email);
                const newCount = data.count + 1;
                saveUserDownloadData(user.email, newCount, data.extra);
                return newCount <= (DEFAULT_MONTHLY_QUOTA + data.extra);
            }

            /* 管理员重置次数：清空已用和额外配额 */
            function resetUserQuota(email) {
                saveUserDownloadData(email, 0, 0);
            }

            /* 管理员设置已用次数（不影响额外配额） */
            function setUserUsedCount(email, count) {
                const data = getUserDownloadData(email);
                saveUserDownloadData(email, Math.max(0, Math.min(count, 999)), data.extra);
            }

            /* 管理员增加次数：调用 addDownloadBonus */
            // 签到、邀请等依旧使用 addDownloadBonus

            // 修改 renderAdminUserList 中按钮的回调
            function bindAdminCardEvents() {
                const container = document.getElementById('adminUserList');
                // ... 升级VIP 不变 ...
                // 重置次数按钮
                container.querySelectorAll('.reset-download-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const email = btn.dataset.email;
                        resetUserQuota(email);
                        showToast('已重置该用户本月下载次数（配额恢复默认）', 'success');
                        updateUserUI();
                    });
                });
                // 设置次数按钮（仅设置已用次数）
                container.querySelectorAll('.set-download-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const email = btn.dataset.email;
                        const data = getUserDownloadData(email);
                        const total = DEFAULT_MONTHLY_QUOTA + data.extra;
                        const promptText = `当前总配额：${total} 次\n已用：${data.count} 次，剩余：${total - data.count} 次\n输入新的已用次数（0~999）`;
                        const newCount = prompt(promptText, data.count);
                        if (newCount !== null && !isNaN(parseInt(newCount))) {
                            setUserUsedCount(email, parseInt(newCount));
                            showToast(`已更新，剩余 ${getRemainingCount(currentUser)} 次`, 'success');
                            updateUserUI();
                        }
                    });
                });
                // 增加次数按钮
                container.querySelectorAll('.add-download-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const email = btn.dataset.email;
                        const add = prompt('请输入要增加的下载次数（1~999）', '5');
                        if (add !== null && !isNaN(parseInt(add))) {
                            const amount = Math.max(1, Math.min(parseInt(add), 999));
                            addDownloadBonus(email, amount);
                            showToast(`已为该用户总配额增加 ${amount} 次`, 'success');
                            updateUserUI();
                        }
                    });
                });
            }

            /* 其他函数保持不变... */
            // 包括签到、邀请时的 addDownloadBonus 调用，现在均会提升配额

            /* 初始化等代码不变 */
        })();
    </script>
