<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>乐哲软件 · 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <!-- 使用更可靠的 CDN -->
    <script src="https://unpkg.com/@supabase/supabase-js@2">
    </script>
    <style>
        :root {
            --bg-primary: #080c14;
            --bg-secondary: #0f172a;
            --bg-card: rgba(18, 30, 51, 0.78);
            --bg-card-solid: #121e33;
            --border-glow: rgba(0, 200, 255, 0.15);
            --border-glow-strong: rgba(0, 200, 255, 0.35);
            --text-primary: #eef5ff;
            --text-secondary: #8da4c9;
            --text-dim: #4a6185;
            --accent-cyan: #00d4ff;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.6);
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, sans-serif;
            --max-width: 1200px;
            --header-height: 64px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.04) 0%, transparent 50%);
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none;
            color: inherit;
        }
        input,
        textarea,
        select {
            font-family: inherit;
            border: none;
            outline: none;
            background: none;
            color: var(--text-primary);
        }
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }
        .hidden {
            display: none !important;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
            border: 1px solid transparent;
            background: var(--bg-card);
            color: var(--text-primary);
            backdrop-filter: blur(8px);
            border-color: var(--border-glow);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.15);
            border-color: var(--accent-cyan);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #080c14;
            border-color: transparent;
            font-weight: 700;
        }
        .btn-primary:hover {
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
            transform: translateY(-2px) scale(1.02);
        }
        .btn-outline {
            background: transparent;
            border-color: var(--border-glow);
            color: var(--text-secondary);
        }
        .btn-outline:hover {
            background: rgba(0, 212, 255, 0.06);
            border-color: var(--accent-cyan);
            color: var(--text-primary);
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            border-color: #ef4444;
            color: #fff;
        }
        .btn-sm {
            padding: 6px 18px;
            font-size: 0.8rem;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card);
            transition: var(--transition);
            overflow: hidden;
        }
        .card:hover {
            border-color: var(--border-glow-strong);
            box-shadow: var(--shadow-card), 0 0 30px rgba(0, 212, 255, 0.05);
            transform: translateY(-4px);
        }

        .badge {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 212, 255, 0.15);
        }
        .badge-purple {
            background: rgba(139, 92, 246, 0.12);
            color: var(--accent-purple);
            border-color: rgba(139, 92, 246, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .login-page {
            display: none;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 20px;
            position: relative;
        }
        .login-page.active {
            display: flex;
        }
        .login-page .bg-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            opacity: 0.12;
        }
        .login-page .bg-glow:nth-child(1) {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
            background: var(--accent-cyan);
        }
        .login-page .bg-glow:nth-child(2) {
            width: 300px;
            height: 300px;
            bottom: -80px;
            left: -80px;
            background: var(--accent-purple);
        }
        .login-box {
            width: 100%;
            max-width: 380px;
            padding: 36px 32px;
            background: var(--bg-card-solid);
            backdrop-filter: blur(32px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-glow-strong);
            box-shadow: var(--shadow-card), 0 0 60px rgba(0, 212, 255, 0.02);
            position: relative;
            z-index: 2;
        }
        .login-box .login-logo {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2px;
            background: linear-gradient(135deg, #fff 30%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-box .login-sub {
            text-align: center;
            color: var(--text-secondary);
            font-weight: 300;
            margin-bottom: 24px;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }
        .login-box .form-group {
            margin-bottom: 14px;
        }
        .login-box label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
        .login-box input {
            width: 100%;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border-glow);
            background: rgba(0, 0, 0, 0.2);
            transition: var(--transition);
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        .login-box input:focus {
            border-color: var(--accent-cyan);
            background: rgba(0, 0, 0, 0.4);
        }
        .login-box .btn {
            width: 100%;
            margin-top: 6px;
            padding: 13px;
            font-size: 0.95rem;
        }
        .login-box .login-error {
            color: #f87171;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 10px;
            min-height: 22px;
        }

        .admin-layout {
            display: none;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .admin-layout.active {
            display: flex;
        }

        .admin-sidebar {
            width: 210px;
            background: rgba(12, 20, 35, 0.88);
            backdrop-filter: blur(24px);
            border-right: 1px solid var(--border-glow);
            padding: 24px 14px;
            flex-shrink: 0;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
        }
        .admin-sidebar .logo-sm {
            font-size: 1.1rem;
            font-weight: 700;
            padding: 0 8px 20px;
            border-bottom: 1px solid var(--border-glow);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }
        .admin-sidebar .logo-sm .mark {
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .admin-sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            margin-bottom: 4px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .admin-sidebar .nav-item:hover {
            background: rgba(0, 212, 255, 0.04);
            border-color: var(--border-glow);
            color: var(--text-primary);
        }
        .admin-sidebar .nav-item.active {
            background: rgba(0, 212, 255, 0.06);
            border-color: var(--border-glow-strong);
            color: var(--text-primary);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.03);
        }
        .admin-sidebar .nav-item .icon {
            font-size: 1rem;
            width: 24px;
            text-align: center;
            color: var(--accent-cyan);
        }
        .admin-sidebar .logout-btn {
            margin-top: 28px;
            border-top: 1px solid var(--border-glow);
            padding-top: 16px;
            color: var(--text-dim);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
        }
        .admin-sidebar .logout-btn:hover {
            color: #f87171;
        }

        .admin-main {
            flex: 1;
            padding: 28px 36px 60px;
            overflow-y: auto;
            max-height: 100vh;
        }
        .admin-main .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }
        .admin-main .page-sub {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-weight: 400;
            font-size: 0.9rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }
        .stat-card {
            padding: 18px 20px;
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card);
        }
        .stat-card .num {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-wrap {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            margin-top: 6px;
        }
        .table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        .table-wrap th {
            text-align: left;
            padding: 10px 16px;
            background: rgba(0, 212, 255, 0.03);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.65rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-glow);
        }
        .table-wrap td {
            padding: 9px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
            vertical-align: middle;
        }
        .table-wrap td .icon-thumb {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 212, 255, 0.06);
            font-size: 18px;
            border: 1px solid rgba(0, 212, 255, 0.06);
        }
        .table-wrap td .icon-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .table-wrap td .actions {
            display: flex;
            gap: 6px;
        }
        .table-wrap td .actions button {
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 600;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .table-wrap td .actions .edit-btn {
            background: rgba(0, 212, 255, 0.08);
            color: var(--accent-cyan);
            border-color: rgba(0, 212, 255, 0.1);
        }
        .table-wrap td .actions .edit-btn:hover {
            background: var(--accent-cyan);
            color: #080c14;
        }
        .table-wrap td .actions .del-btn {
            background: rgba(239, 68, 68, 0.08);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.1);
        }
        .table-wrap td .actions .del-btn:hover {
            background: #ef4444;
            color: #fff;
        }
        .table-wrap .empty-row td {
            padding: 36px 18px;
            text-align: center;
            color: var(--text-dim);
        }

        .admin-form {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card);
            padding: 24px 28px;
            margin-top: 6px;
        }
        .admin-form .form-group {
            margin-bottom: 16px;
        }
        .admin-form label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }
        .admin-form label .required {
            color: #f87171;
            margin-left: 2px;
        }
        .admin-form input,
        .admin-form textarea,
        .admin-form select {
            width: 100%;
            padding: 9px 14px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border-glow);
            background: rgba(0, 0, 0, 0.25);
            transition: var(--transition);
            font-size: 0.88rem;
            color: var(--text-primary);
        }
        .admin-form input:focus,
        .admin-form textarea:focus,
        .admin-form select:focus {
            border-color: var(--accent-cyan);
            background: rgba(0, 0, 0, 0.4);
        }
        .admin-form textarea {
            min-height: 70px;
            resize: vertical;
        }
        .admin-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .admin-form .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }
        .admin-form select option {
            background: #121e33;
        }
        .admin-form .icon-preview {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .admin-form .icon-preview .preview-box {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-glow);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            font-size: 22px;
        }
        .admin-form .icon-preview .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .toast-container {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 340px;
        }
        .toast {
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            background: var(--bg-card-solid);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow-strong);
            box-shadow: var(--shadow-card);
            font-size: 0.85rem;
            color: var(--text-primary);
            transform: translateX(120%);
            animation: toastIn 0.4s ease forwards;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.success .icon {
            color: var(--accent-cyan);
        }
        .toast.error .icon {
            color: #f87171;
        }
        .toast .icon {
            font-size: 1.1rem;
        }
        @keyframes toastIn {
            to {
                transform: translateX(0);
            }
        }
        @keyframes toastOut {
            to {
                transform: translateX(120%);
                opacity: 0;
            }
        }

        @media (max-width: 900px) {
            .admin-sidebar {
                width: 60px;
                padding: 14px 6px;
            }
            .admin-sidebar .logo-sm span,
            .admin-sidebar .nav-item span:not(.icon),
            .admin-sidebar .logout-btn span {
                display: none;
            }
            .admin-sidebar .logo-sm {
                justify-content: center;
                padding: 0 0 14px;
                font-size: 1.3rem;
            }
            .admin-sidebar .nav-item {
                justify-content: center;
                padding: 10px;
            }
            .admin-sidebar .nav-item .icon {
                font-size: 1.2rem;
                width: auto;
            }
            .admin-sidebar .logout-btn {
                justify-content: center;
            }
            .admin-main {
                padding: 20px 16px 40px;
            }
            .admin-form .form-row {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 768px) {
            .admin-layout.active {
                flex-direction: column;
            }
            .admin-sidebar {
                width: 100%;
                height: auto;
                position: static;
                flex-direction: row;
                padding: 10px 14px;
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
                border-right: none;
                border-bottom: 1px solid var(--border-glow);
            }
            .admin-sidebar .logo-sm {
                display: none;
            }
            .admin-sidebar .nav-item {
                padding: 6px 12px;
                font-size: 0.75rem;
            }
            .admin-sidebar .nav-item .icon {
                font-size: 0.9rem;
                width: 20px;
            }
            .admin-sidebar .logout-btn {
                margin-top: 0;
                border-top: none;
                padding-top: 0;
                margin-left: auto;
                font-size: 0.75rem;
            }
            .admin-main {
                max-height: none;
                padding: 16px 14px 40px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .table-wrap {
                overflow-x: auto;
            }
            .table-wrap table {
                font-size: 0.75rem;
                min-width: 480px;
            }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="login-page active" id="loginPage">
        <div class="bg-glow"></div>
        <div class="bg-glow"></div>
        <div class="login-box">
            <div class="login-logo">◆ 乐哲软件</div>
            <div class="login-sub">管理控制台</div>
            <div class="form-group">
                <label>用户标识</label>
                <input type="text" id="loginUser" value="admin" placeholder="用户名" />
            </div>
            <div class="form-group">
                <label>安全密钥</label>
                <input type="password" id="loginPass" placeholder="密码" />
            </div>
            <button class="btn btn-primary" id="loginBtn">✦ 进入控制台</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <div class="admin-layout" id="adminApp">
        <aside class="admin-sidebar">
            <div class="logo-sm"><span class="mark">◆</span> <span>乐哲软件</span></div>
            <div class="nav-item active" data-tab="dashboard"><span class="icon">◈</span> <span>仪表盘</span></div>
            <div class="nav-item" data-tab="software"><span class="icon">⊞</span> <span>软件管理</span></div>
            <div class="nav-item" data-tab="categories"><span class="icon">⌗</span> <span>分类管理</span></div>
            <div class="nav-item" data-tab="add"><span class="icon">⊕</span> <span>上传软件</span></div>
            <div class="logout-btn" id="adminLogout"><span class="icon">↺</span> <span>退 出</span></div>
        </aside>
        <div class="admin-main" id="adminMain"></div>
    </div>

    <script>
        // ============================================================
        //  配置 Supabase（已内置您的密钥）
        // ============================================================
        var SUPABASE_URL = 'https://qqcxtfayjxyvswblmdpw.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable__KOJGRcvoRGC3QiHNg7_qA_-9yGsnCW';

        // 创建 Supabase 客户端（使用 window.supabase 或全局变量）
        var supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        //  数据层
        // ============================================================
        var DB = {
            get: function(key) {
                try { return JSON.parse(localStorage.getItem('lezhe_' + key)) || null; } catch (e) { return null; }
            },
            set: function(key, val) {
                localStorage.setItem('lezhe_' + key, JSON.stringify(val));
            },
            genId: function() {
                return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            },

            // Supabase 操作
            async getSoftwareFromCloud() {
                try {
                    var result = await supabaseClient
                        .from('software')
                        .select('*')
                        .order('created_at', { ascending: false });

        // ============================================================
        function hashPassword(password) {
            var hash = 0;
            for (var i = 0; i < password.length; i++) {
                var char = password.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString(16) + 'x' + password.length.toString(16);
        }

        function verifyPassword(input, storedHash) {
            var parts = storedHash.split('x');
            if (parts.length !== 2) return false;
            var expectedHash = parts[0];
            var len = parseInt(parts[1], 16);
            if (input.length !== len) return false;
            var computedHash = hashPassword(input).split('x')[0];
            return computedHash === expectedHash;
        }

                        var result = await DB.addSoftwareToCloud(newSoft);
                        if (result) {
                            toast('上传成功: ' + data.name, 'success');
                            form.reset();
                            self.renderAdminTab('software');
                        } else {
                            toast('上传失败，请重试', 'error');
                        }
                    }
                });
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            App.init();
        });

        window.__APP = App;
        window.__DB = DB;
    </script>
</body>
</html>
