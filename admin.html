<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>乐哲软件 · 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@supabase/supabase-js@2">
    </script>
    <style>
        :root {
            --bg-primary: #080c14;
            --bg-secondary: #0f172a;
            --bg-card: rgba(18, 30, 51, 0.78);
            --bg-card-solid: #121e33;
            --bg-input: rgba(0, 0, 0, 0.25);
            --border-glow: rgba(0, 200, 255, 0.15);
            --border-glow-strong: rgba(0, 200, 255, 0.35);
            --text-primary: #eef5ff;
            --text-secondary: #8da4c9;
            --text-dim: #4a6185;
            --accent-cyan: #00d4ff;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-green: #34d399;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.6);
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, sans-serif;
            --max-width: 1200px;
            --header-height: 64px;
            --sidebar-width: 210px;
        }
        [data-theme="light"] {
            --bg-primary: #f0f4ff;
            --bg-secondary: #e8edf8;
            --bg-card: rgba(255, 255, 255, 0.82);
            --bg-card-solid: #ffffff;
            --bg-input: rgba(0, 0, 0, 0.05);
            --border-glow: rgba(0, 100, 200, 0.15);
            --border-glow-strong: rgba(0, 100, 200, 0.30);
            --text-primary: #0a1628;
            --text-secondary: #3d557a;
            --text-dim: #7a8aa8;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.08);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.04) 0%, transparent 50%);
        }
        [data-theme="light"] body {
            background-image: radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.02) 0%, transparent 50%);
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none;
            color: inherit;
        }
        input,
        textarea,
        select {
            font-family: inherit;
            border: none;
            outline: none;
            background: none;
            color: var(--text-primary);
        }
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }
        .hidden {
            display: none !important;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
            border: 1px solid transparent;
            background: var(--bg-card);
            color: var(--text-primary);
            backdrop-filter: blur(8px);
            border-color: var(--border-glow);
            min-height: 44px;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.15);
            border-color: var(--accent-cyan);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #080c14;
            border-color: transparent;
            font-weight: 700;
        }
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
            transform: translateY(-2px) scale(1.02);
        }
        .btn-outline {
            background: transparent;
            border-color: var(--border-glow);
            color: var(--text-secondary);
        }
        .btn-outline:hover:not(:disabled) {
            background: rgba(0, 212, 255, 0.06);
            border-color: var(--accent-cyan);
            color: var(--text-primary);
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .btn-danger:hover:not(:disabled) {
            background: rgba(239, 68, 68, 0.25);
            border-color: #ef4444;
            color: #fff;
        }
        .btn-success {
            background: rgba(52, 211, 153, 0.15);
            border-color: rgba(52, 211, 153, 0.2);
            color: var(--accent-green);
        }
        .btn-success:hover:not(:disabled) {
            background: rgba(52, 211, 153, 0.25);
            border-color: var(--accent-green);
            color: #fff;
        }
        .btn-sm {
            padding: 6px 18px;
            font-size: 0.8rem;
            min-height: 36px;
        }
        .btn-xs {
            padding: 3px 12px;
            font-size: 0.7rem;
            border-radius: 50px;
            min-height: 30px;
        }
        .btn-back {
            background: transparent;
            border-color: transparent;
            color: var(--text-secondary);
            padding: 4px 8px;
            gap: 4px;
            min-height: 32px;
            font-size: 0.85rem;
        }
        .btn-back:hover:not(:disabled) {
            border-color: var(--border-glow);
            color: var(--text-primary);
            transform: translateX(-2px);
            box-shadow: none;
        }
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card);
            transition: var(--transition);
            overflow: hidden;
        }
        .badge {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 212, 255, 0.15);
        }
        .badge-purple {
            background: rgba(139, 92, 246, 0.12);
            color: var(--accent-purple);
            border-color: rgba(139, 92, 246, 0.2);
        }
        .badge-green {
            background: rgba(52, 211, 153, 0.12);
            color: var(--accent-green);
            border-color: rgba(52, 211, 153, 0.2);
        }
        .badge-dim {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-dim);
            border-color: rgba(255, 255, 255, 0.06);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .login-page {
            display: none;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 20px;
            position: relative;
        }
        .login-page.active {
            display: flex;
        }
        .login-page .bg-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            opacity: 0.12;
        }
        .login-page .bg-glow:nth-child(1) {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
            background: var(--accent-cyan);
        }
        .login-page .bg-glow:nth-child(2) {
            width: 300px;
            height: 300px;
            bottom: -80px;
            left: -80px;
            background: var(--accent-purple);
        }
        .login-box {
            width: 100%;
            max-width: 380px;
            padding: 36px 32px;
            background: var(--bg-card-solid);
            backdrop-filter: blur(32px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-glow-strong);
            box-shadow: var(--shadow-card), 0 0 60px rgba(0, 212, 255, 0.02);
            position: relative;
            z-index: 2;
        }
        .login-box .login-logo {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2px;
            background: linear-gradient(135deg, #fff 30%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        [data-theme="light"] .login-box .login-logo {
            background: linear-gradient(135deg, #0a1628 30%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-box .login-sub {
            text-align: center;
            color: var(--text-secondary);
            font-weight: 300;
            margin-bottom: 24px;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }
        .login-box .form-group {
            margin-bottom: 14px;
        }
        .login-box label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
        .login-box input {
            width: 100%;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border-glow);
            background: var(--bg-input);
            transition: var(--transition);
            font-size: 0.9rem;
            color: var(--text-primary);
            min-height: 48px;
        }
        .login-box input:focus {
            border-color: var(--accent-cyan);
            background: rgba(0, 0, 0, 0.4);
        }
        .login-box .btn {
            width: 100%;
            margin-top: 6px;
            padding: 13px;
            font-size: 0.95rem;
            min-height: 52px;
        }
        .login-box .login-error {
            color: #f87171;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 10px;
            min-height: 22px;
        }
        .admin-layout {
            display: none;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .admin-layout.active {
            display: flex;
        }
        .admin-sidebar {
            width: var(--sidebar-width);
            background: rgba(12, 20, 35, 0.88);
            backdrop-filter: blur(24px);
            border-right: 1px solid var(--border-glow);
            padding: 24px 14px;
            flex-shrink: 0;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            transition: background 0.3s, border-color 0.3s;
        }
        [data-theme="light"] .admin-sidebar {
            background: rgba(240, 244, 255, 0.92);
            border-right-color: rgba(0, 100, 200, 0.12);
        }
        .admin-sidebar .logo-sm {
            font-size: 1.1rem;
            font-weight: 700;
            padding: 0 8px 20px;
            border-bottom: 1px solid var(--border-glow);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }
        .admin-sidebar .logo-sm .mark {
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .admin-sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            margin-bottom: 2px;
            cursor: pointer;
            border: 1px solid transparent;
            font-size: 0.9rem;
            min-height: 44px;
        }
        .admin-sidebar .nav-item:hover {
            background: rgba(0, 212, 255, 0.04);
            border-color: var(--border-glow);
            color: var(--text-primary);
        }
        .admin-sidebar .nav-item.active {
            background: rgba(0, 212, 255, 0.06);
            border-color: var(--border-glow-strong);
            color: var(--text-primary);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.03);
        }
        .admin-sidebar .nav-item .icon {
            font-size: 1rem;
            width: 24px;
            text-align: center;
            color: var(--accent-cyan);
        }
        .admin-sidebar .logout-btn {
            margin-top: 28px;
            border-top: 1px solid var(--border-glow);
            padding-top: 16px;
            color: var(--text-dim);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
            min-height: 44px;
        }
        .admin-sidebar .logout-btn:hover {
            color: #f87171;
        }
        .admin-sidebar .theme-toggle {
            margin-top: 12px;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-glow);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            background: transparent;
            min-height: 44px;
        }
        .admin-sidebar .theme-toggle:hover {
            border-color: var(--accent-cyan);
            color: var(--text-primary);
        }
        .admin-main {
            flex: 1;
            padding: 28px 36px 60px;
            overflow-y: auto;
            max-height: 100vh;
        }
        .admin-main .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .admin-main .page-title .back-link {
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 50px;
            border: 1px solid transparent;
        }
        .admin-main .page-title .back-link:hover {
            border-color: var(--border-glow);
            color: var(--text-primary);
            transform: translateX(-2px);
        }
        .admin-main .page-sub {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-weight: 400;
            font-size: 0.9rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }
        .stat-card {
            padding: 18px 20px;
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card);
        }
        .stat-card .num {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .table-wrap {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            margin-top: 6px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            min-height: auto;
        }
        .table-wrap .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            font-size: 0.9rem;
            color: var(--text-secondary);
            gap: 10px;
        }
        .table-wrap .loading-overlay .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-glow);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            min-width: 500px;
        }
        .table-wrap th {
            text-align: left;
            padding: 10px 12px;
            background: rgba(0, 212, 255, 0.03);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.65rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-glow);
            position: sticky;
            top: 0;
            background: var(--bg-card);
            z-index: 1;
            backdrop-filter: blur(8px);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        .table-wrap th:hover {
            color: var(--text-primary);
        }
        .table-wrap th .sort-icon {
            font-size: 0.6rem;
            margin-left: 4px;
            opacity: 0.4;
        }
        .table-wrap th.active .sort-icon {
            opacity: 1;
        }
        .table-wrap td {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
            vertical-align: middle;
        }
        [data-theme="light"] .table-wrap td {
            border-bottom-color: rgba(0, 0, 0, 0.04);
        }
        .table-wrap tr.clickable {
            cursor: pointer;
            transition: var(--transition);
        }
        .table-wrap tr.clickable:hover {
            background: rgba(0, 212, 255, 0.03);
        }
        .table-wrap td .icon-thumb {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 212, 255, 0.06);
            font-size: 18px;
            border: 1px solid rgba(0, 212, 255, 0.06);
        }
        .table-wrap td .icon-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .table-wrap td .actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .table-wrap td .actions button {
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.6rem;
            font-weight: 600;
            transition: var(--transition);
            border: 1px solid transparent;
            min-height: 28px;
        }
        .table-wrap td .actions .edit-btn {
            background: rgba(0, 212, 255, 0.08);
            color: var(--accent-cyan);
            border-color: rgba(0, 212, 255, 0.1);
        }
        .table-wrap td .actions .edit-btn:hover {
            background: var(--accent-cyan);
            color: #080c14;
        }
        .table-wrap td .actions .del-btn {
            background: rgba(239, 68, 68, 0.08);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.1);
        }
        .table-wrap td .actions .del-btn:hover {
            background: #ef4444;
            color: #fff;
        }
        .table-wrap td .actions .view-btn {
            background: rgba(139, 92, 246, 0.08);
            color: var(--accent-purple);
            border-color: rgba(139, 92, 246, 0.1);
        }
        .table-wrap td .actions .view-btn:hover {
            background: var(--accent-purple);
            color: #fff;
        }
        .table-wrap .empty-row td {
            padding: 36px 18px;
            text-align: center;
            color: var(--text-dim);
        }
        .table-wrap .checkbox-cell {
            width: 36px;
            text-align: center;
        }
        .table-wrap .checkbox-cell input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-cyan);
            cursor: pointer;
            flex-shrink: 0;
        }
        .admin-form {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-glow);
            box-shadow: var(--shadow-card);
            padding: 24px 28px;
            margin-top: 6px;
        }
        .admin-form .form-group {
            margin-bottom: 16px;
        }
        .admin-form label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }
        .admin-form label .required {
            color: #f87171;
            margin-left: 2px;
        }
        .admin-form input,
        .admin-form textarea,
        .admin-form select {
            width: 100%;
            padding: 9px 14px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border-glow);
            background: var(--bg-input);
            transition: var(--transition);
            font-size: 0.88rem;
            color: var(--text-primary);
            min-height: 44px;
        }
        .admin-form input:focus,
        .admin-form textarea:focus,
        .admin-form select:focus {
            border-color: var(--accent-cyan);
            background: rgba(0, 0, 0, 0.4);
        }
        .admin-form textarea {
            min-height: 70px;
            resize: vertical;
        }
        .admin-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .admin-form .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .admin-form select option {
            background: #121e33;
        }
        [data-theme="light"] .admin-form select option {
            background: #ffffff;
            color: #0a1628;
        }
        .admin-form .icon-preview {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            flex-wrap: wrap;

    <script>
        var SUPABASE_URL = 'https://qqcxtfayjxyvswblmdpw.supabase.co';
        var SUPABASE_ANON_KEY = 'sb_publishable__KOJGRcvoRGC3QiHNg7_qA_-9yGsnCW';
        var supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        var DB = {
            get: function(key) {
                try { return JSON.parse(localStorage.getItem('lezhe_' + key)) || null; } catch (e) { return null; }
            },
            set: function(key, val) {
                localStorage.setItem('lezhe_' + key, JSON.stringify(val));
            },
            genId: function() {
                return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            },
            _softwareCache: null,
            _cacheTime: 0,
            _cacheTTL: 120000,
            _categoriesCache: null,
            _categoriesTime: 0,

            async getSoftwareFromCloud(force) {
                force = force || false;
                var now = Date.now();
                if (!force && this._softwareCache && (now - this._cacheTime < this._cacheTTL)) {
                    return this._softwareCache;
                }
                try {
                    var result = await supabaseClient.from('software').select('*').order('created_at', { ascending: false });
                    if (result.error) { console.error('获取软件失败:', result.error); return this._softwareCache || []; }
                    this._softwareCache = result.data || [];
                    this._cacheTime = now;
                    return this._softwareCache;
                } catch (e) { console.error('获取软件异常:', e); return this._softwareCache || []; }
            },
            async getCategoriesFromCloud(force) {
                force = force || false;
                var now = Date.now();
                if (!force && this._categoriesCache && (now - this._categoriesTime < this._cacheTTL)) {
                    return this._categoriesCache;
                }
                try {
                    var result = await supabaseClient.from('categories').select('name').order('name');
                    if (result.error) { console.error('获取分类失败:', result.error); return ['设计工具', '开发工具', '办公软件',
                            '媒体工具', '实用工具'
                        ]; }
                    this._categoriesCache = result.data.map(function(item) { return item.name; });
                    this._categoriesTime = now;
                    return this._categoriesCache;
                } catch (e) { console.error('获取分类异常:', e); return ['设计工具', '开发工具', '办公软件', '媒体工具', '实用工具']; }
            },
            invalidateCache: function() {
                this._softwareCache = null;
                this._cacheTime = 0;
                this._categoriesCache = null;
                this._categoriesTime = 0;
            },
            async addSoftwareToCloud(soft) {
                try {
                    var result = await supabaseClient.from('software').insert(soft).select();
                    if (result.error) { console.error('添加软件失败:', result.error); return null; }
                    this.invalidateCache();
                    return result.data ? result.data[0] : null;
                } catch (e) { console.error('添加软件异常:', e); return null; }
            },
            async updateSoftwareInCloud(id, updates) {
                try {
                    var result = await supabaseClient.from('software').update(updates).eq('id', id);
                    if (result.error) console.error('更新软件失败:', result.error);
                    this.invalidateCache();
                } catch (e) { console.error('更新软件异常:', e); }
            },
            async deleteSoftwareFromCloud(id) {
                try {
                    var result = await supabaseClient.from('software').delete().eq('id', id);

        function hashPassword(password) {
            var hash = 0;
            for (var i = 0; i < password.length; i++) {
                var char = password.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString(16) + 'x' + password.length.toString(16);
        }

        function verifyPassword(input, storedHash) {
            var parts = storedHash.split('x');
            if (parts.length !== 2) return false;
            var expectedHash = parts[0];
            var len = parseInt(parts[1], 16);
            if (input.length !== len) return false;
            var computedHash = hashPassword(input).split('x')[0];
            return computedHash === expectedHash;
        }

                    catCount[c] = (catCount[c] || 0) + 1;

                for (var ci = 0; ci < sortedCats.length; ci++) {
                    if (catCount[sortedCats[ci]] > maxCount) maxCount = catCount[sortedCats[ci]];
                }
                maxCount = Math.max(maxCount, 1);

                var catRowsHtml = '';

                        '<span class="cat-count">' + count + '</span>' +
                        '</div>';
                }

                        '<div class="cat-bar-bg"><div class="cat-bar" style="width:' + Math.round((remainCount / maxCount) *

                    .length + '</div><div class="label">分类数</div></div><div class="stat-card"><div class="num">' +
                    totalDownloads + '</div><div class="label">总下载</div></div><div class="stat-card"><div class="num">' +
                    totalViews + '</div><div class="label">总浏览</div></div><div class="stat-card"><div class="num">' +
                    recommendCount + '</div><div class="label">推荐软件</div></div></div>';

                html +=
                    '<div class="card chart-card"><div class="chart-header"><h4>📊 分类分布</h4><span style="font-size:0.7rem;color:var(--text-dim);">共 ' +
                    sortedCats.length + ' 个分类</span></div>' + chartHtml + '</div>';

                html +=
                    '<div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 10px;flex-wrap:wrap;gap:8px;"><h3 style="font-weight:600;color:var(--text-secondary);font-size:0.95rem;">📋 最近添加</h3><button class="btn btn-xs btn-outline" id="refreshDashboard">⟳ 刷新</button></div>';
                html += '<div class="table-wrap"><table><thead><tr><th>名称</th><th>分类</th><th>版本</th><th>日期</th></tr></thead><tbody>';

                            '') + '</td><td>' + s.category + '</td><td>v' + s.version + '</td><td>' + (s.created_at ?
                            formatDate(s.created_at) : s.date || '') + '</td></tr>';

            renderSoftwareList: function(container) {

            _renderSoftwarePage: function(container) {
                var self = this;
                var all = this._allSoftware;
                if (!all) all = [];
                var keyword = this._searchKeyword.toLowerCase().trim();
                var filterCat = this._filterCategory;

                var filtered = all.filter(function(s) {
                    var matchName = s.name.toLowerCase().includes(keyword);
                    var matchCat = filterCat === 'all' || s.category === filterCat;
                    return matchName && matchCat;
                });

                if (this._sortField) {
                    var field = this._sortField;
                    var order = this._sortOrder || 'asc';
                    filtered.sort(function(a, b) {
                        var va = (a[field] || '').toString().toLowerCase();
                        var vb = (b[field] || '').toString().toLowerCase();
                        if (field === 'downloads') {
                            va = parseInt(a[field]) || 0;
                            vb = parseInt(b[field]) || 0;
                        }
                        if (va < vb) return order === 'asc' ? -1 : 1;
                        if (va > vb) return order === 'asc' ? 1 : -1;
                        return 0;
                    });
                }

                this._filteredSoftware = filtered;

                var total = filtered.length;
                var pageSize = this._pageSize;
                var totalPages = Math.ceil(total / pageSize) || 1;
                if (this._currentPage > totalPages) this._currentPage = totalPages;
                var start = (this._currentPage - 1) * pageSize;
                var end = Math.min(start + pageSize, total);
                var pageItems = filtered.slice(start, end);

                var cats = ['all'];
                var catSet = {};
                for (var ci = 0; ci < all.length; ci++) {
                    var c = all[ci].category;
                    if (c && !catSet[c]) { catSet[c] = true;
                        cats.push(c); }
                }

                var html = '<h2 class="page-title">⊞ 软件管理</h2><p class="page-sub">共 ' + total +
                    ' 款资源</p><div class="toolbar">';
                html +=
                    '<div class="search-box"><span class="icon">🔍</span><input type="text" id="searchInput" placeholder="搜索软件名称..." value="' +
                    this._searchKeyword + '" /></div>';
                html += '<select class="filter-select" id="categoryFilter">';
                for (var ci2 = 0; ci2 < cats.length; ci2++) {
                    var cName = cats[ci2];
                    var label = cName === 'all' ? '全部分类' : cName;
                    var sel = cName === this._filterCategory ? 'selected' : '';
                    html += '<option value="' + cName + '" ' + sel + '>' + label + '</option>';
                }
                html += '</select>';
                html += '<div class="btn-group">';
                html += '<button class="btn btn-sm btn-outline" id="refreshBtn">⟳ 刷新</button>';
                html += '<button class="btn btn-sm btn-success" id="exportBtn">📥 导出</button>';
                if (this._selectedIds.length > 0) {
                    html += '<button class="btn btn-sm btn-success" id="batchRecommendBtn">⭐ 推荐 (' + this._selectedIds
                        .length + ')</button>';
                    html += '<button class="btn btn-sm btn-outline" id="batchUnrecommendBtn">☆ 取消推荐</button>';
                    html += '<button class="btn btn-sm btn-danger" id="batchDelBtn">🗑 删除 (' + this._selectedIds
                        .length + ')</button>';
                }
                html += '<span class="selected-info" id="selectedInfo">已选 ' + this._selectedIds.length + ' 项</span>';
                html += '</div></div>';

                html += '<div class="table-wrap" id="softwareTableWrap"></div>';

                html += '<div class="pagination"><div class="info">共 ' + total + ' 条，第 ' + (start + 1) + '-' + end +
                    ' 条</div><div class="pages">';
                html += '<button class="page-btn" data-page="prev" ' + (this._currentPage <= 1 ? 'disabled' : '') + '>‹</button>';
                var maxShow = Math.min(totalPages, 7);
                var startPage = Math.max(1, this._currentPage - 3);
                var endPage = Math.min(totalPages, startPage + 6);
                if (endPage - startPage < 6) startPage = Math.max(1, endPage - 6);
                for (var p = startPage; p <= endPage; p++) {
                    var active = p === this._currentPage ? 'active' : '';
                    html += '<button class="page-btn ' + active + '" data-page="' + p + '">' + p + '</button>';
                }
                html += '<button class="page-btn" data-page="next" ' + (this._currentPage >= totalPages ? 'disabled' : '') +
                    '>›</button>';
                html += '</div></div>';

                container.innerHTML = html;
                this._tabCache['software'] = container.innerHTML;

                var wrap = document.getElementById('softwareTableWrap');
                var selectedIds = this._selectedIds;
                var isLoading = this._isLoading;
                var selfRef = this;

                var handleSort = function(field) {
                    if (selfRef._sortField === field) {
                        selfRef._sortOrder = selfRef._sortOrder === 'asc' ? 'desc' : 'asc';
                    } else {
                        selfRef._sortField = field;
                        selfRef._sortOrder = 'asc';
                    }
                    selfRef._renderSoftwarePage(container);
                };

                Render.renderAdminTable(wrap, pageItems, {
                    selectedIds: selectedIds,
                    isLoading: isLoading,
                    sortField: this._sortField,
                    sortOrder: this._sortOrder,
                    onSort: handleSort,
                    onView: function(id) {
                        var soft = self._allSoftware.find(function(s) { return s.id === id; });
                        if (soft) App.showDetail(soft);
                        else toast('未找到该软件', 'error');
                    },
                    onEdit: function(id) {
                        var soft = self._allSoftware.find(function(s) { return s.id === id; });
                        if (soft) {
                            self._editingId = id;
                            self._selectedIds = [];
                            self.renderAdminTab('add');
                            setTimeout(function() {
                                var form = document.getElementById('adminForm');
                                if (form) {
                                    self._fillEditForm(soft);
                                }
                            }, 50);
                        } else {
                            toast('未找到该软件', 'error');
                        }
                    },
                    onDelete: async function(id) {
                        if (confirm('确定要删除此软件吗？')) {
                            await DB.deleteSoftwareFromCloud(id);
                            DB.addLog('删除软件', '删除软件 ID: ' + shortId(id));
                            toast('已删除', 'success');
                            DB.invalidateCache();
                            self._dataLoaded = false;
                            var data = await DB.getSoftwareFromCloud(true);
                            self._allSoftware = data;
                            self._filteredSoftware = data.slice();
                            self._dataLoaded = true;
                            self._selectedIds = [];
                            self._renderSoftwarePage(container);
                            self._tabCache['software'] = container.innerHTML;
                        }
                    },
                    onSelect: function() {
                        var checks = wrap.querySelectorAll('.row-checkbox:checked');
                        var ids = [];
                        for (var i = 0; i < checks.length; i++) {
                            ids.push(checks[i].dataset.id);
                        }
                        self._selectedIds = ids;
                        var info = document.getElementById('selectedInfo');
                        if (info) info.textContent = '已选 ' + ids.length + ' 项';
                        var batchDelBtn = document.getElementById('batchDelBtn');
                        var batchRecBtn = document.getElementById('batchRecommendBtn');
                        var batchUnrecBtn = document.getElementById('batchUnrecommendBtn');
                        if (batchDelBtn) {
                            if (ids.length > 0) {
                                batchDelBtn.textContent = '🗑 删除 (' + ids.length + ')';
                                batchDelBtn.style.display = 'inline-flex';
                            } else {
                                batchDelBtn.style.display = 'none';
                            }
                        }
                        if (batchRecBtn) {
                            if (ids.length > 0) {
                                batchRecBtn.textContent = '⭐ 推荐 (' + ids.length + ')';
                                batchRecBtn.style.display = 'inline-flex';
                            } else {
                                batchRecBtn.style.display = 'none';
                            }
                        }
                        if (batchUnrecBtn) {
                            if (ids.length > 0) {
                                batchUnrecBtn.textContent = '☆ 取消推荐';
                                batchUnrecBtn.style.display = 'inline-flex';
                            } else {
                                batchUnrecBtn.style.display = 'none';
                            }
                        }
                    }
                });

                this._bindSoftwareEvents(container);
            },

            _exportCSV: function(data) {
                if (!data || data.length === 0) { toast('没有数据可导出', 'error'); return; }
                var headers = ['名称', '分类', '版本', '下载量', '浏览数', '推荐', '日期'];
                var rows = data.map(function(s) {
                    return [
                        s.name,
                        s.category,
                        'v' + s.version,
                        s.downloads || 0,
                        s.views || 0,
                        s.recommend ? '是' : '否',
                        s.created_at ? formatDate(s.created_at) : s.date || ''
                    ];
                });
                var csv = headers.join(',') + '\n' + rows.map(function(r) { return r.join(','); }).join('\n');
                var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                var link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = '软件列表_' + new Date().toISOString().slice(0, 10) + '.csv';
                link.click();
                URL.revokeObjectURL(link.href);
                toast('导出成功', 'success');
                DB.addLog('导出数据', '导出软件列表，共 ' + data.length + ' 条');
            },

                    ' <span class="back-link" id="backFromAdd"><span style="font-size:1rem;">←</span> 返回列表</span></h2><p class="page-sub">' +
                    (isEdit ? '更新软件信息' : '向工坊提交新软件') +
                    '</p><form class="admin-form" id="adminForm"><div class="form-row"><div class="form-group"><label>软件名称 <span class="required">*</span></label><input type="text" name="name" placeholder="如：乐哲笔记" required /></div><div class="form-group"><label>分类 <span class="required">*</span></label><select name="category" required></select></div></div><div class="form-row"><div class="form-group"><label>版本 <span class="required">*</span></label><input type="text" name="version" placeholder="如：2.0.0" required /></div><div class="form-group"><label>Emoji 图标 (备选)</label><input type="text" name="icon" placeholder="📦" /></div></div><div class="form-group"><label>图床链接 (推荐) <span style="color:var(--text-dim);font-weight:400;font-size:0.75rem;">输入图片URL，优先显示</span></label><input type="url" name="iconUrl" placeholder="https://example.com/icon.png" /><div class="icon-preview"><span>预览：</span><span class="preview-box">📦</span><span style="font-size:0.7rem;color:var(--text-dim);">支持 PNG / JPG / SVG</span></div></div><div class="form-group"><label>下载链接 <span style="color:var(--text-dim);font-weight:400;font-size:0.75rem;">软件包直链或网盘</span></label><input type="url" name="downloadUrl" placeholder="https://example.com/software.zip" /></div><div class="form-row"><div class="form-group"><label>文件大小</label><input type="text" name="size" placeholder="如：18.5 MB" /></div><div class="form-group"><label>推荐</label><div style="display:flex;align-items:center;gap:8px;padding-top:6px;"><input type="checkbox" name="recommend" style="width:auto;height:18px;width:18px;accent-color:var(--accent-cyan);" /><span style="font-size:0.8rem;color:var(--text-secondary);">设为推荐</span></div></div></div><div class="form-group"><label>支持平台 <span class="required">*</span></label><div class="checkbox-group"><label><input type="checkbox" name="platformMac" value="mac" /> 🍎 Mac</label><label><input type="checkbox" name="platformWin" value="windows" /> 🪟 Windows</label></div></div><div class="form-group"><label>简介 <span class="required">*</span></label><input type="text" name="description" placeholder="一句话介绍软件" required /></div><div class="form-group"><label>详细介绍</label><textarea name="detail" placeholder="详细描述功能、特点……"></textarea></div><div class="form-actions"><button type="submit" class="btn btn-primary" id="submitFormBtn">' +
                    (isEdit ? '✎ 更新' : '⊕ 上传') +
                    '</button><button type="button" class="btn btn-outline btn-cancel ' + (isEdit ? '' : 'hidden') +
                    '" id="cancelEditBtn">取消</button></div></form>';
                container.innerHTML = html;

                var select = container.querySelector('[name="category"]');
                var selfRef = this;
                DB.getCategoriesFromCloud().then(function(cats) {
                    if (select) {
                        select.innerHTML = cats.map(function(c) { return '<option value="' + c + '">' + c +
                            '</option>'; }).join('');
                        if (selfRef._editingId) {
                            var soft = selfRef._allSoftware.find(function(s) { return s.id === selfRef
                                ._editingId; });
                            if (soft) select.value = soft.category || '';
                        }
                    }
                    if (selfRef._editingId) {
                        var soft = selfRef._allSoftware.find(function(s) { return s.id === selfRef
                            ._editingId; });
                        if (soft) {
                            selfRef._fillEditForm(soft);
                        }
                    }
                });

                var backLink = container.querySelector('#backFromAdd');
                if (backLink) {
                    backLink.addEventListener('click', function() {
                        self._editingId = null;
                        self._selectedIds = [];
                        self.renderAdminTab('software');
                    });
                }

                var form = document.getElementById('adminForm');
                if (!form) return;

                var iconUrlInput = form.querySelector('[name="iconUrl"]');
                var iconEmojiInput = form.querySelector('[name="icon"]');
                var previewBox = form.querySelector('.preview-box');

                var updatePreview = function() {
                    var url = iconUrlInput.value.trim();
                    var emoji = iconEmojiInput.value.trim() || '📦';
                    if (url) {
                        previewBox.innerHTML = '<img src="' + url +
                            '" alt="icon" onerror="this.style.display=\'none\';this.parentElement.textContent=\'' +
                            emoji + '\'" />';
                    } else {
                        previewBox.textContent = emoji;
                    }
                };
                if (iconUrlInput) iconUrlInput.addEventListener('input', updatePreview);
                if (iconEmojiInput) iconEmojiInput.addEventListener('input', updatePreview);

                var cancelBtn = document.getElementById('cancelEditBtn');
                if (cancelBtn) {
                    cancelBtn.addEventListener('click', function() {
                        self._editingId = null;
                        self._selectedIds = [];
                        self.renderAdminTab('software');
                    });
                }

                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    if (self._isSubmitting) return;
                    self._isSubmitting = true;
                    var submitBtn = document.getElementById('submitFormBtn');
                    if (submitBtn) {
                        submitBtn.disabled = true;
                        submitBtn.textContent = '⏳ 提交中...';
                    }

                    try {
                        var platforms = [];
                        var macCheck = form.querySelector('[name="platformMac"]');
                        var winCheck = form.querySelector('[name="platformWin"]');
                        if (macCheck && macCheck.checked) platforms.push('mac');
                        if (winCheck && winCheck.checked) platforms.push('windows');

                        var data = {
                            name: form.querySelector('[name="name"]').value.trim(),
                            category: form.querySelector('[name="category"]').value,
                            version: form.querySelector('[name="version"]').value.trim(),
                            icon: form.querySelector('[name="icon"]').value.trim() || '📦',
                            icon_url: form.querySelector('[name="iconUrl"]').value.trim(),
                            download_url: form.querySelector('[name="downloadUrl"]').value.trim(),
                            platforms: platforms,
                            size: form.querySelector('[name="size"]').value.trim(),
                            description: form.querySelector('[name="description"]').value.trim(),
                            detail: form.querySelector('[name="detail"]').value.trim(),
                            recommend: form.querySelector('[name="recommend"]').checked
                        };

                        if (!data.name || !data.category || !data.version || !data.description) {
                            toast('请填写完整信息（名称、分类、版本、简介为必填）', 'error');
                            return;
                        }
                        if (platforms.length === 0) {
                            toast('请至少选择一个支持平台', 'error');
                            return;
                        }

                        if (self._editingId) {
                            await DB.updateSoftwareInCloud(self._editingId, data);
                            DB.addLog('更新软件', '更新软件: ' + data.name + ' (ID: ' + shortId(self._editingId) + ')');
                            toast('已更新: ' + data.name, 'success');
                            self._editingId = null;
                            self._tabCache['software'] = null;
                            self._dataLoaded = false;
                            var updated = await DB.getSoftwareFromCloud(true);
                            self._allSoftware = updated;
                            self._filteredSoftware = updated.slice();
                            self._dataLoaded = true;
                            self.renderAdminTab('software');
                        } else {
                            var newSoft = {
                                id: DB.genId(),
                                name: data.name,
                                category: data.category,
                                version: data.version,
                                icon: data.icon,
                                icon_url: data.icon_url,
                                download_url: data.download_url,
                                platforms: data.platforms,
                                size: data.size,
                                description: data.description,
                                detail: data.detail,
                                recommend: data.recommend,
                                date: new Date().toISOString().slice(0, 10),
                                created_at: new Date().toISOString(),
                                views: 0,
                                downloads: 0
                            };
                            var result = await DB.addSoftwareToCloud(newSoft);
                            if (result) {
                                DB.addLog('添加软件', '添加软件: ' + data.name + ' (ID: ' + shortId(newSoft.id) + ')');
                                toast('上传成功: ' + data.name, 'success');
                                form.reset();
                                if (previewBox) previewBox.textContent = '📦';
                                self._editingId = null;
                                self._tabCache['software'] = null;
                                self._dataLoaded = false;
                                var newData = await DB.getSoftwareFromCloud(true);
                                self._allSoftware = newData;
                                self._filteredSoftware = newData.slice();
                                self._dataLoaded = true;
                                self.renderAdminTab('software');
                            } else {
                                toast('上传失败，请检查网络后重试', 'error');
                            }
                        }
                    } catch (err) {
                        toast('操作失败: ' + err.message, 'error');
                    } finally {
                        self._isSubmitting = false;
                        if (submitBtn) {
                            submitBtn.disabled = false;
                            submitBtn.textContent = self._editingId ? '✎ 更新' : '⊕ 上传';
                        }
                    }
                });

                this._tabCache['add'] = container.innerHTML;
            },

            _updateIconPreview: function(form) {
                var url = form.querySelector('[name="iconUrl"]').value.trim();
                var preview = form.querySelector('.preview-box');
                var emoji = form.querySelector('[name="icon"]').value.trim() || '📦';
                if (url) {
                    preview.innerHTML = '<img src="' + url +
                        '" alt="icon" onerror="this.style.display=\'none\';this.parentElement.textContent=\'' + emoji +
                        '\'" />';
                } else {
                    preview.textContent = emoji;
                }
            },

            renderUsers: function(container) {
                var users = DB.get('users') || [];
                var currentUser = sessionStorage.getItem('lezhe_admin_user') || 'admin';

                var html =
                    '<h2 class="page-title">👤 用户管理</h2><p class="page-sub">管理后台账号</p><div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;"><input type="text" id="newUsername" placeholder="新用户名" style="padding:8px 14px;border-radius:50px;border:1.5px solid var(--border-glow);background:var(--bg-input);flex:1;min-width:120px;color:var(--text-primary);min-height:44px;" /><input type="password" id="newPassword" placeholder="密码 (至少4位)" style="padding:8px 14px;border-radius:50px;border:1.5px solid var(--border-glow);background:var(--bg-input);flex:1;min-width:120px;color:var(--text-primary);min-height:44px;" /><button class="btn btn-sm btn-primary" id="addUserBtn">⊕ 添加用户</button></div><div class="table-wrap"><table><thead><tr><th>用户名</th><th>角色</th><th style="width:120px;">操作</th></tr></thead><tbody>';
                if (users.length === 0) {
                    html += '<tr class="empty-row"><td colspan="3">暂无用户</td></tr>';
                } else {
                    for (var i = 0; i < users.length; i++) {
                        var u = users[i];
                        var isSelf = u.username === currentUser;
                        html += '<tr><td>' + u.username + (isSelf ? ' <span class="badge badge-green">当前</span>' : '') +
                            '</td><td>管理员</td><td>';
                        if (!isSelf) {
                            html +=
                                '<button class="del-btn" data-user="' + u.username +
                                '" style="padding:3px 12px;border-radius:50px;font-size:0.65rem;background:rgba(239,68,68,0.08);color:#f87171;border:1px solid rgba(239,68,68,0.1);min-height:30px;">删除</button>';
                        } else {
                            html += '<span style="color:var(--text-dim);font-size:0.7rem;">不可删除</span>';
                        }
                        html += '</td></tr>';
                    }
                }
                html += '</tbody></table></div>';
                container.innerHTML = html;
                this._tabCache['users'] = html;
                this._bindUsersEvents(container);
            },

            renderSettings: function(container) {
                var currentUser = sessionStorage.getItem('lezhe_admin_user') || 'admin';
                var logs = DB.getLogs();

                var html = '<h2 class="page-title">⚙ 系统设置</h2><p class="page-sub">管理配置与操作日志</p>';

                html +=
                    '<div class="card" style="padding:24px 28px;margin-bottom:20px;"><h3 style="font-size:1rem;font-weight:600;margin-bottom:12px;">🔑 修改密码</h3><form id="changePwdForm"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;"><input type="password" id="oldPwd" placeholder="当前密码" style="padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border-glow);background:var(--bg-input);color:var(--text-primary);min-height:44px;" /><input type="password" id="newPwd" placeholder="新密码 (至少4位)" style="padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border-glow);background:var(--bg-input);color:var(--text-primary);min-height:44px;" /><input type="password" id="confirmPwd" placeholder="确认新密码" style="padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border-glow);background:var(--bg-input);color:var(--text-primary);min-height:44px;" /></div><button type="submit" class="btn btn-sm btn-primary">更新密码</button></form></div>';

                html +=
                    '<div class="card" style="padding:24px 28px;"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;"><h3 style="font-size:1rem;font-weight:600;">📋 操作日志 (' +
                    logs.length + ')</h3><div><button class="btn btn-xs btn-outline" id="clearLogsBtn">清空日志</button></div></div>';
                if (logs.length === 0) {
                    html += '<div style="color:var(--text-dim);text-align:center;padding:20px 0;">暂无操作记录</div>';
                } else {
                    html +=
                        '<div style="max-height:300px;overflow-y:auto;font-size:0.8rem;"><table style="width:100%;border-collapse:collapse;">';
                    html +=
                        '<thead><tr><th style="text-align:left;padding:4px 8px;color:var(--text-secondary);font-weight:600;">时间</th><th style="text-align:left;padding:4px 8px;color:var(--text-secondary);font-weight:600;">用户</th><th style="text-align:left;padding:4px 8px;color:var(--text-secondary);font-weight:600;">操作</th><th style="text-align:left;padding:4px 8px;color:var(--text-secondary);font-weight:600;">详情</th></tr></thead><tbody>';
                    for (var i = 0; i < Math.min(logs.length, 100); i++) {
                        var log = logs[i];
                        html += '<tr><td style="padding:4px 8px;white-space:nowrap;">' + formatDate(log.time) +
                            '</td><td style="padding:4px 8px;">' + log.user + '</td><td style="padding:4px 8px;">' + log
                            .action + '</td><td style="padding:4px 8px;color:var(--text-secondary);">' + log.detail +
                            '</td></tr>';
                    }
                    html += '</tbody></table></div>';
                }
                html += '</div>';

                container.innerHTML = html;
                this._tabCache['settings'] = html;
                this._bindSettingsEvents(container);
            },

            showDetail: function(soft) {
                var modal = document.getElementById('detailModal');
                var title = document.getElementById('detailTitle');
                var body = document.getElementById('detailBody');

                title.textContent = '📄 ' + soft.name;

                var platforms = soft.platforms || [];
                var platformStr = getPlatformLabels(platforms);

                body.innerHTML =
                    '<div class="detail-row"><div class="label">图标</div><div class="value"><span class="icon-thumb">' +
                    renderIconThumb(soft) + '</span></div></div>' +
                    '<div class="detail-row"><div class="label">名称</div><div class="value">' + soft.name +
                    '</div></div>' +
                    '<div class="detail-row"><div class="label">分类</div><div class="value">' + soft.category +
                    '</div></div>' +
                    '<div class="detail-row"><div class="label">版本</div><div class="value">v' + soft.version +
                    '</div></div>' +
                    '<div class="detail-row"><div class="label">平台</div><div class="value">' + platformStr +
                    '</div></div>' +
                    '<div class="detail-row"><div class="label">大小</div><div class="value">' + (soft.size || '-') +
                    '</div></div>' +
                    '<div class="detail-row"><div class="label">下载</div><div class="value">' + (soft.downloads || 0) +
                    ' 次</div></div>' +
                    '<div class="detail-row"><div class="label">浏览</div><div class="value">' + (soft.views || 0) +
                    ' 次</div></div>' +
                    '<div class="detail-row"><div class="label">推荐</div><div class="value">' + (soft.recommend ?
                        '✅ 是' : '❌ 否') + '</div></div>' +
                    '<div class="detail-row"><div class="label">简介</div><div class="value">' + (soft.description ||
                        '-') + '</div></div>' +
                    '<div class="detail-row"><div class="label">详情</div><div class="value">' + (soft.detail || '-') +
                    '</div></div>' +
                    '<div class="detail-row"><div class="label">下载链接</div><div class="value">' + (soft.download_url ?
                        '<a href="' + soft.download_url +
                        '" target="_blank" style="color:var(--accent-cyan);word-break:break-all;">' + soft
                        .download_url + '</a>' : '-') + '</div></div>' +
                    '<div class="detail-row"><div class="label">创建时间</div><div class="value">' + (soft.created_at ?
                        formatDate(soft.created_at) : soft.date || '-') + '</div></div>' +
                    '<div class="detail-row"><div class="label">ID</div><div class="value" style="font-size:0.7rem;color:var(--text-dim);">' +
                    soft.id + '</div></div>';

                modal.classList.remove('hidden');
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            App.init();
        });

        window.__APP = App;
        window.__DB = DB;
    </script>
