<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>乐哲软件 · 管理中枢</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #f0f4fc;
            --surface: rgba(255, 255, 255, 0.75);
            --surface-solid: #ffffff;
            --border: rgba(100, 130, 220, 0.15);
            --text: #1a1f36;
            --text-secondary: #5b6275;
            --primary: #5b6cf0;
            --primary-light: #e8ecff;
            --primary-glow: #8b9cf7;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 24px;
            --radius-sm: 14px;
            --shadow: 0 8px 32px rgba(0, 20, 50, 0.06);
            --shadow-hover: 0 16px 40px rgba(0, 20, 50, 0.12);
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(91, 108, 240, 0.2);
            --glass-blur: blur(18px);
            --grid-pattern: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%235b6cf0' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: var(--grid-pattern);
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }
        .login-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(4px);
        }
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-hover);
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .login-card h2 {
            font-size: 28px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #5b6cf0, #8b9cf7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }
        .login-card p {
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        .login-card input {
            width: 100%;
            padding: 16px 22px;
            border: 1px solid var(--border);
            border-radius: 60px;
            font-size: 16px;
            margin-bottom: 24px;
            outline: none;
            background: rgba(255, 255, 255, 0.7);
            color: var(--text);
            transition: all 0.3s;
        }
        .login-card input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(91, 108, 240, 0.15);
            background: white;
        }
        .login-card button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #5b6cf0, #8b9cf7);
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 24px rgba(91, 108, 240, 0.25);
        }
        .login-card button:hover {
            box-shadow: 0 12px 32px rgba(91, 108, 240, 0.4);
            transform: translateY(-2px);
        }
        .login-error {
            color: var(--danger);
            margin-top: 16px;
            font-size: 14px;
        }
        #mainContent {
            display: flex;
            width: 100%;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }
        .sidebar {
            width: 280px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--glass-border);
            padding: 28px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            transition: transform 0.3s ease;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.02);
        }
        .sidebar-header {
            font-size: 1.5rem;
            font-weight: 800;
            padding: 0 16px 28px;
            background: linear-gradient(135deg, #5b6cf0, #8b9cf7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.25s;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 0.95rem;
            position: relative;
            overflow: hidden;
        }
        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
            text-align: center;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 0;
            background: var(--primary);
            border-radius: 0 4px 4px 0;
            transition: height 0.3s;
        }
        .nav-item:hover {
            background: rgba(91, 108, 240, 0.08);
            color: var(--text);
        }
        .nav-item:hover::before {
            height: 50%;
        }
        .nav-item.active {
            background: linear-gradient(135deg, #e8ecff, #f0f4ff);
            color: var(--primary);
            font-weight: 600;
        }
        .nav-item.active::before {
            height: 70%;
            background: var(--primary-glow);
        }
        .content-area {
            flex: 1;
            margin-left: 280px;
            padding: 32px;
            overflow-y: auto;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }
        .mobile-nav-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text);
            font-size: 20px;
            box-shadow: var(--shadow);
        }
        .panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--surface-solid);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }
        .stat-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-hover);
        }
        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
            background: var(--primary-light);
            color: var(--primary);
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--text);
        }
        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .category-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 28px;
        }
        .cat-filter-btn {
            padding: 8px 22px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.25s;
            color: var(--text-secondary);
        }
        .cat-filter-btn.active,
        .cat-filter-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(91, 108, 240, 0.25);
        }
        .software-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .software-card {
            background: var(--surface-solid);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .software-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-hover);
            transform: translateY(-4px);
        }
        .sw-card-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .sw-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
            background: linear-gradient(135deg, #5b6cf0, #8b9cf7);
        }
        .sw-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 14px;
        }
        .sw-name {
            font-weight: 600;
            font-size: 1.05rem;
        }
        .sw-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .sw-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.3px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #5b6cf0, #8b9cf7);
            color: white;
            box-shadow: 0 4px 15px rgba(91, 108, 240, 0.2);
        }
        .btn-primary:hover {
            box-shadow: 0 8px 25px rgba(91, 108, 240, 0.35);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.08);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.15);
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th,
        .table td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .table th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: white;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 10000;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(12px);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(10px);
            }
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.8);
            color: var(--text);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 20px rgba(91, 108, 240, 0.1);
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 20000;
        }
        .modal.active {
            display: flex;
        }
        .modal-card {
            background: var(--surface-solid);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            width: 90%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }
        .file-input {
            display: none;
        }
        .hint-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .content-area {
                margin-left: 0;
                padding: 20px;
            }
            .mobile-nav-toggle {
                display: flex;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .software-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h2>⚡ 乐哲控制台</h2>
            <p>请输入管理密钥</p>
            <input type="password" id="loginPasswordInput" placeholder="········" onkeypress="if(event.key==='Enter')document.getElementById('loginBtn').click()">
            <button id="loginBtn">验证访问</button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <button class="mobile-nav-toggle" id="mobileNavToggle"><i class="fas fa-bars"></i></button>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">乐哲 · 中枢</div>
            <button class="nav-item active" data-panel="dashboard"><i class="fas fa-chart-pie"></i> 仪表盘</button>
            <button class="nav-item" data-panel="softwares"><i class="fas fa-cubes"></i> 软件矩阵</button>
            <button class="nav-item" data-panel="ads"><i class="fas fa-ad"></i> 广告流</button>
            <button class="nav-item" data-panel="users"><i class="fas fa-users"></i> 用户群</button>
            <button class="nav-item" data-panel="messages"><i class="fas fa-comments"></i> 留言板</button>
            <button class="nav-item" id="logoutSidebarBtn"><i class="fas fa-sign-out-alt"></i> 断开连接</button>
        </div>
        <div class="content-area" id="contentArea">
            <div id="dashboardPanel" class="panel">
                <h2 style="margin-bottom:28px;">📊 系统概览</h2>
                <div class="stats-grid" id="dashboardStats"></div>
                <h3 style="margin-top:32px;margin-bottom:16px;">🆕 最近注册</h3>
                <div style="overflow-x:auto;">
                    <table class="table"><thead><tr><th>邮箱</th><th>用户名</th><th>时间戳</th></tr></thead><tbody id="recentUsersTbody"></tbody></table>
                </div>
            </div>
            <div id="softwaresPanel" class="panel" style="display:none;">
                <div class="panel-header">
                    <h2>📦 软件矩阵</h2>
                    <button class="btn btn-primary" id="addSoftwareBtn"><i class="fas fa-plus"></i> 添加软件</button>
                </div>
                <div class="category-filters" id="categoryFilters"></div>
                <div class="software-grid" id="softwareGrid"></div>
            </div>
            <div id="adsPanel" class="panel" style="display:none;">
                <h2 style="margin-bottom:28px;">🎬 广告流管理</h2>
                <div class="form-grid">
                    <div class="form-group"><label>标题</label><input type="text" id="adTitle"></div>
                    <div class="form-group"><label>链接</label><input type="url" id="adLink"></div>
                    <div class="form-group"><label>图片URL</label><input type="text" id="adImageUrl" placeholder="https://..."></div>
                    <div class="form-group"><label>位置</label><select id="adPosition"><option value="banner">横幅</option><option value="sidebar">侧边栏</option></select></div>
                    <div class="form-group"><label>启用</label><input type="checkbox" id="adEnabled" checked style="width:20px;height:20px;accent-color:var(--primary);"></div>
                </div>
                <div style="margin-top:20px;display:flex;gap:14px;">
                    <button class="btn btn-primary" id="saveAdBtn">保存广告</button>
                    <button class="btn btn-outline" id="cancelAdBtn">取消</button>
                </div>
                <input type="hidden" id="editingAdId">
                <h3 style="margin-top:36px;">现有广告</h3>
                <div id="adsList"></div>
            </div>
            <div id="usersPanel" class="panel" style="display:none;">
                <h2 style="margin-bottom:28px;">👥 用户群</h2>
                <div class="form-grid">
                    <div class="form-group"><label>邮箱</label><input type="email" id="newUserEmail"></div>
                    <div class="form-group"><label>用户名</label><input type="text" id="newUsername"></div>
                    <div class="form-group"><label>密码</label><input type="password" id="newUserPassword"></div>
                    <div class="form-group"><label>角色</label><select id="newUserRole"><option value="user">普通</option><option value="admin">管理员</option></select></div>
                </div>
                <button class="btn btn-primary" id="addUserBtn" style="margin-top:20px;">添加用户</button>
                <h3 style="margin-top:36px;">用户列表</h3>
                <div id="usersList"></div>
            </div>
            <div id="messagesPanel" class="panel" style="display:none;">
                <h2 style="margin-bottom:28px;">💬 留言板</h2>
                <div id="messagesList"></div>
            </div>
        </div>
    </div>

    <div id="softwareModal" class="modal">
        <div class="modal-card">
            <h3 id="softwareModalTitle" style="margin-bottom:20px;">添加软件</h3>
            <div class="form-grid">
                <div class="form-group"><label>名称 *</label><input type="text" id="swName"></div>
                <div class="form-group"><label>分类 *</label><select id="swCategory"></select></div>
                <div class="form-group"><label>版本</label><input type="text" id="swVersion"></div>
                <div class="form-group"><label>系统 *</label>
                    <div style="display:flex;gap:16px;align-items:center;margin-top:8px;">
                        <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" id="osWindows" checked> Windows</label>
                        <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" id="osMac" checked> Mac</label>
                    </div>
                </div>
                <div class="form-group"><label>链接 *</label><input type="url" id="swURL"></div>
                <div class="form-group"><label>描述</label><textarea id="swDescription" rows="2"></textarea></div>
                <div class="form-group"><label>图标</label><input type="text" id="swIcon" placeholder="fa-图标 或 URL"></div>
            </div>
            <div style="margin-top:24px;display:flex;gap:14px;">
                <button class="btn btn-primary" id="saveSoftwareBtn">确认</button>
                <button class="btn btn-outline" id="closeSoftwareModal">取消</button>
            </div>
            <input type="hidden" id="editingSoftwareId">
        </div>
    </div>

    <div id="categoryModal" class="modal">
        <div class="modal-card">
            <h3 style="margin-bottom:20px;">分类管理</h3>
            <div style="display:flex;gap:12px;margin-bottom:20px;">
                <input type="text" id="newCatName" placeholder="新分类名称" style="flex:1;padding:12px 18px;border-radius:40px;border:1px solid var(--border);background:rgba(255,255,255,0.8);">
                <button class="btn btn-primary" id="addCategoryBtn">添加</button>
            </div>
            <div id="categoriesList"></div>
            <button class="btn btn-outline" id="closeCategoryModal" style="margin-top:20px;">关闭</button>
        </div>
    </div>

        function showToast(msg, isError = false) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.background = isError ? '#ef4444' : '#1a1f36';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        async function airtableRequest(method, path, body = null) {
            const url = `https://api.airtable.com/v0/${CONFIG.AIRTABLE_BASE_ID}/${path}`;
            const headers = { 'Authorization': `Bearer ${CONFIG.AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' };
            const opts = { method, headers };
            if (body) opts.body = JSON.stringify(body);
            const resp = await fetch(url, opts);
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({ error: { message: '请求失败' } }));
                throw new Error(err.error?.message || `HTTP ${resp.status}`);
            }
            return resp.json();
        }
        function getSmartAbbreviation(name) {
            if (!name) return 'SW';
            const lower = name.toLowerCase().trim();
            const map = { 'photoshop': 'PS', 'illustrator': 'AI', 'premiere pro': 'PR', 'after effects': 'AE', 'lightroom': 'LR', 'indesign': 'ID', 'cinema 4d': 'C4D', 'autocad': 'AC', 'sketchup': 'SU', 'rhino': 'RH', 'blender': 'BL' };
            if (map[lower]) return map[lower];
            for (let [k, v] of Object.entries(map)) if (lower.includes(k)) return v;
            const words = name.split(/[\s\-_]+/).filter(w => w.length);
            if (words.length >= 2) return words.map(w => w.charAt(0).toUpperCase()).slice(0, 3).join('');
            return name.slice(0, 2).toUpperCase();
        }
        function renderSoftwareIcon(record) {
            const name = record.name || '软件';
            const icon = record.icon;
            if (Array.isArray(icon) && icon[0]?.url) return `<img src="${icon[0].url}">`;
            if (typeof icon === 'string' && (icon.startsWith('http') || icon.startsWith('data:'))) return `<img src="${icon}">`;
            if (typeof icon === 'string' && icon.startsWith('fa-')) return `<i class="fas ${icon}"></i>`;
            return `<span>${getSmartAbbreviation(name)}</span>`;
        }
        async function loadCategories() {
            try {
                const data = await airtableRequest('GET', 'Categories?maxRecords=100');
                cachedCategories = data.records.map(r => r.fields.Name || r.fields.name);
            } catch (e) {
                cachedCategories = ['Adobe系列', 'Autodesk系列', '3D建模', '图像处理', '视频剪辑', '工程设计', '其他'];
            }
            if (!cachedCategories.length) cachedCategories = ['其他'];
            renderCategorySelects();
            renderCategoryFilters();
        }
        function renderCategorySelects() {
            const select = document.getElementById('swCategory');
            if (select) select.innerHTML = cachedCategories.map(c => `<option value="${c}">${c}</option>`).join('');
            const filterDiv = document.getElementById('categoryFilters');
            if (filterDiv) {
                filterDiv.innerHTML = `<button class="cat-filter-btn active" data-cat="all">全部</button>` +
                    cachedCategories.map(c => `<button class="cat-filter-btn" data-cat="${c}">${c}</button>`).join('');
                filterDiv.querySelectorAll('.cat-filter-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        filterDiv.querySelectorAll('.cat-filter-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        currentCategoryFilter = btn.dataset.cat;
                        renderSoftwareGrid();
                    });
                });
            }
        }
        function renderCategoryFilters() {
            const filterDiv = document.getElementById('categoryFilters');
            if (!filterDiv) return;
            filterDiv.innerHTML = `<button class="cat-filter-btn active" data-cat="all">全部</button>` +
                cachedCategories.map(c => `<button class="cat-filter-btn" data-cat="${c}">${c}</button>`).join('');
            filterDiv.querySelectorAll('.cat-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    filterDiv.querySelectorAll('.cat-filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategoryFilter = btn.dataset.cat;
                    renderSoftwareGrid();
                });
            });
        }
        async function loadSoftwares() {
            try {
                const data = await airtableRequest('GET', 'softwares?maxRecords=100');
                allSoftwares = data.records.map(r => ({
                    id: r.id,
                    name: r.fields.name || r.fields.Name || '',
                    category: r.fields.category || r.fields.Category || '其他',
                    version: r.fields.version || r.fields.Version || '',
                    os: r.fields.os || r.fields.OS || '',
                    url: r.fields.url || r.fields.URL || '#',
                    description: r.fields.description || r.fields.Description || '',
                    icon: r.fields.icon || r.fields.Icon || '',
                    addedDate: r.fields.addedDate || r.fields.AddedDate || ''
                }));
                renderSoftwareGrid();
            } catch (e) { showToast('加载软件失败', true); }
        }
        function renderSoftwareGrid() {
            const grid = document.getElementById('softwareGrid');
            const filtered = currentCategoryFilter === 'all' ? allSoftwares : allSoftwares.filter(s => s.category === currentCategoryFilter);
            if (!filtered.length) {
                grid.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text-secondary);">暂无软件</p>';
                return;
            }
            grid.innerHTML = filtered.map(sw => {
                const osDisplay = Array.isArray(sw.os) ? sw.os.join(', ') : sw.os;
                return `<div class="software-card">
                    <div class="sw-card-header">
                        <div class="sw-icon">${renderSoftwareIcon(sw)}</div>
                        <div>
                            <div class="sw-name">${sw.name}</div>
                            <div class="sw-meta">${sw.version || '最新版'}</div>
                        </div>
                    </div>
                    <div class="sw-meta">${osDisplay}</div>
                    <div class="sw-actions">
                        <button class="btn btn-outline edit-sw-btn" data-id="${sw.id}"><i class="fas fa-edit"></i> 编辑</button>
                        <button class="btn btn-danger delete-sw-btn" data-id="${sw.id}"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }).join('');
            document.querySelectorAll('.edit-sw-btn').forEach(btn => btn.addEventListener('click', () => editSoftware(btn.dataset.id)));
            document.querySelectorAll('.delete-sw-btn').forEach(btn => btn.addEventListener('click', () => deleteSoftware(btn.dataset.id)));
        }
        async function editSoftware(id) {
            const sw = allSoftwares.find(s => s.id === id);
            if (!sw) return;
            document.getElementById('editingSoftwareId').value = id;
            document.getElementById('softwareModalTitle').textContent = '编辑软件';
            document.getElementById('swName').value = sw.name;
            document.getElementById('swCategory').value = sw.category;
            document.getElementById('swVersion').value = sw.version;
            const osArr = Array.isArray(sw.os) ? sw.os : (typeof sw.os === 'string' ? sw.os.split(',').map(s => s.trim()) : []);
            document.getElementById('osWindows').checked = osArr.includes('Windows');
            document.getElementById('osMac').checked = osArr.includes('Mac');
            document.getElementById('swURL').value = sw.url;
            document.getElementById('swDescription').value = sw.description;
            document.getElementById('swIcon').value = sw.icon;
            document.getElementById('softwareModal').classList.add('active');
        }
        async function deleteSoftware(id) {
            if (!confirm('确定删除？')) return;
            try {
                await airtableRequest('DELETE', `softwares/${id}`);
                showToast('已删除');
                loadSoftwares();
                loadDashboard();
            } catch (e) { showToast('删除失败', true); }
        }
        document.getElementById('saveSoftwareBtn').addEventListener('click', async () => {
            const name = document.getElementById('swName').value.trim();
            const category = document.getElementById('swCategory').value;
            const version = document.getElementById('swVersion').value.trim();
            const osArr = [];
            if (document.getElementById('osWindows').checked) osArr.push('Windows');
            if (document.getElementById('osMac').checked) osArr.push('Mac');
            const url = document.getElementById('swURL').value.trim();
            const description = document.getElementById('swDescription').value.trim();
            const icon = document.getElementById('swIcon').value.trim();
            if (!name || !category || !url || osArr.length === 0) return showToast('请填写必填项', true);
            const fields = { name, category, version, os: osArr.join(', '), url, description, icon: icon || getSmartAbbreviation(name), addedDate: new Date().toISOString().slice(0, 10) };
            const id = document.getElementById('editingSoftwareId').value;
            try {
                if (id) await airtableRequest('PATCH', `softwares/${id}`, { fields });
                else await airtableRequest('POST', 'softwares', { fields });
                showToast('保存成功');
                document.getElementById('softwareModal').classList.remove('active');
                loadSoftwares();
                loadDashboard();
            } catch (e) { showToast('保存失败: ' + e.message, true); }
        });
        document.getElementById('closeSoftwareModal').addEventListener('click', () => {
            document.getElementById('softwareModal').classList.remove('active');
            document.getElementById('editingSoftwareId').value = '';
        });
        document.getElementById('addSoftwareBtn').addEventListener('click', () => {
            document.getElementById('softwareModalTitle').textContent = '添加软件';
            document.getElementById('swName').value = '';
            document.getElementById('swVersion').value = '';
            document.getElementById('swURL').value = '';
            document.getElementById('swDescription').value = '';
            document.getElementById('swIcon').value = '';
            document.getElementById('osWindows').checked = true;
            document.getElementById('osMac').checked = true;
            document.getElementById('editingSoftwareId').value = '';
            document.getElementById('softwareModal').classList.add('active');
        });
        async function loadAds() {
            try {
                const data = await airtableRequest('GET', 'Ads?maxRecords=50');
                const list = document.getElementById('adsList');
                if (!data.records.length) { list.innerHTML = '<p>暂无广告</p>'; return; }
                list.innerHTML = data.records.map(r => {
                    const f = r.fields;
                    return `<div style="display:flex;gap:16px;align-items:center;padding:14px;border-bottom:1px solid var(--border);">
                        <img src="${f.Image||f.image||''}" style="width:80px;height:40px;object-fit:cover;border-radius:8px;" onerror="this.style.display='none'">
                        <div style="flex:1"><strong>${f.Title||''}</strong><br><small>${f.Position||'sidebar'}</small></div>
                        <button class="btn btn-outline edit-ad-btn" data-id="${r.id}">编辑</button>
                        <button class="btn btn-danger delete-ad-btn" data-id="${r.id}">删除</button>
                    </div>`;
                }).join('');
                document.querySelectorAll('.edit-ad-btn').forEach(b => b.addEventListener('click', () => editAd(b.dataset.id)));
                document.querySelectorAll('.delete-ad-btn').forEach(b => b.addEventListener('click', () => {
                    if (confirm('删除？')) { airtableRequest('DELETE', `Ads/${b.dataset.id}`).then(() => { loadAds(); showToast('已删除'); }).catch(() => showToast('失败', true)); }
                }));
            } catch (e) { showToast('加载广告失败', true); }
        }
        async function editAd(id) {
            try {
                const data = await airtableRequest('GET', `Ads/${id}`);
                const f = data.fields;
                document.getElementById('adTitle').value = f.Title || '';
                document.getElementById('adLink').value = f.Link || '';
                document.getElementById('adImageUrl').value = f.Image || '';
                document.getElementById('adPosition').value = f.Position || 'sidebar';
                document.getElementById('adEnabled').checked = f.Enabled !== false;
                document.getElementById('editingAdId').value = id;
            } catch (e) { showToast('加载失败', true); }
        }
        document.getElementById('saveAdBtn').addEventListener('click', async () => {
            const fields = { Title: document.getElementById('adTitle').value, Link: document.getElementById('adLink').value, Image: document.getElementById('adImageUrl').value, Position: document.getElementById('adPosition').value, Enabled: document.getElementById('adEnabled').checked };
            if (!fields.Link || !fields.Image) return showToast('链接和图片必填', true);
            const id = document.getElementById('editingAdId').value;
            try {
                if (id) await airtableRequest('PATCH', `Ads/${id}`, { fields });
                else await airtableRequest('POST', 'Ads', { fields });
                showToast('保存成功');
                document.getElementById('cancelAdBtn').click();
                loadAds();
            } catch (e) { showToast('失败', true); }
        });
        document.getElementById('cancelAdBtn').addEventListener('click', () => { document.getElementById('adTitle').value = ''; document.getElementById('adLink').value = ''; document.getElementById('adImageUrl').value = ''; document.getElementById('editingAdId').value = ''; });
        async function loadUsers() {
            try {
                const data = await airtableRequest('GET', 'Users?maxRecords=100');
                document.getElementById('usersList').innerHTML = data.records.length ? data.records.map(r => `<div style="display:flex;justify-content:space-between;align-items:center;padding:14px;border-bottom:1px solid var(--border);"><span>${r.fields.Email} (${r.fields.Username||''})</span><button class="btn btn-danger" onclick="deleteUser('${r.id}')">删除</button></div>`).join('') : '<p>暂无用户</p>';
            } catch (e) { showToast('加载失败', true); }
        }
        window.deleteUser = async (id) => { if (confirm('删除用户？')) { try { await airtableRequest('DELETE', `Users/${id}`); loadUsers(); loadDashboard(); } catch (e) { showToast('失败', true); } } };
        document.getElementById('addUserBtn').addEventListener('click', async () => {
            const email = document.getElementById('newUserEmail').value.trim();
            const username = document.getElementById('newUsername').value.trim();
            const pwd = document.getElementById('newUserPassword').value.trim();
            const role = document.getElementById('newUserRole').value;
            if (!email || !username || !pwd) return showToast('请填写完整', true);
            try {
                await airtableRequest('POST', 'Users', { fields: { Email: email, Username: username, Password: CryptoJS.SHA256(pwd).toString(), Role: role } });
                showToast('添加成功');
                loadUsers();
                loadDashboard();
                document.getElementById('newUserEmail').value = '';
                document.getElementById('newUsername').value = '';
                document.getElementById('newUserPassword').value = '';
            } catch (e) { showToast('失败', true); }
        });
        async function loadMessages() {
            try {
                const data = await airtableRequest('GET', 'messages?maxRecords=50');
                document.getElementById('messagesList').innerHTML = data.records.length ? data.records.map(r => `<div style="display:flex;justify-content:space-between;padding:14px;border-bottom:1px solid var(--border);"><span><strong>${r.fields.Name||'网友'}</strong>: ${r.fields.Message||''}</span><button class="btn btn-danger" onclick="deleteMessage('${r.id}')">删除</button></div>`).join('') : '<p>暂无留言</p>';
            } catch (e) { showToast('加载失败', true); }
        }
        window.deleteMessage = async (id) => { if (confirm('删除留言？')) { try { await airtableRequest('DELETE', `messages/${id}`); loadMessages(); loadDashboard(); } catch (e) { showToast('失败', true); } } };
        async function loadDashboard() {
            try {
                const [users, sw, msgs] = await Promise.all([airtableRequest('GET', 'Users'), airtableRequest('GET', 'softwares'), airtableRequest('GET', 'messages')]);
                document.getElementById('dashboardStats').innerHTML = `
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-value">${users.records.length}</div><div class="stat-label">注册用户</div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#e8ecff; color:#5b6cf0;"><i class="fas fa-cubes"></i></div><div class="stat-value">${sw.records.length}</div><div class="stat-label">软件数量</div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#d1fae5; color:#10b981;"><i class="fas fa-comments"></i></div><div class="stat-value">${msgs.records.length}</div><div class="stat-label">留言总数</div></div>
                `;
                const recent = await airtableRequest('GET', 'Users?maxRecords=5');
                document.getElementById('recentUsersTbody').innerHTML = recent.records.map(r => `<tr><td>${r.fields.Email}</td><td>${r.fields.Username||''}</td><td>${r.fields.CreatedAt?new Date(r.fields.CreatedAt).toLocaleString('zh-CN'):'未知'}</td></tr>`).join('');
            } catch (e) { showToast('仪表盘加载失败', true); }
        }
        function switchPanel(panel) {
            ['dashboard', 'softwares', 'ads', 'users', 'messages'].forEach(p => {
                document.getElementById(p + 'Panel').style.display = p === panel ? 'block' : 'none';
            });
            if (panel === 'dashboard') loadDashboard();
            if (panel === 'softwares') { loadCategories(); loadSoftwares(); }
            if (panel === 'ads') loadAds();
            if (panel === 'users') loadUsers();
            if (panel === 'messages') loadMessages();
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`.nav-item[data-panel="${panel}"]`).classList.add('active');
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
        }
        document.querySelectorAll('.nav-item[data-panel]').forEach(item => {
            item.addEventListener('click', () => switchPanel(item.dataset.panel));
        });
        document.getElementById('mobileNavToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });
        document.getElementById('logoutSidebarBtn').addEventListener('click', () => {
            sessionStorage.removeItem('admin_logged');
            window.location.reload();
        });
        const loginBtn = document.getElementById('loginBtn');
        const loginPasswordInput = document.getElementById('loginPasswordInput');
        const loginError = document.getElementById('loginError');
        function checkLogin() {
            if (loginPasswordInput.value === atob(ENCODED_PASSWORD)) {
                sessionStorage.setItem('admin_logged', 'true');
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'flex';
                loadDashboard();
                loadCategories();
                loadSoftwares();
                loadAds();
                loadUsers();
                loadMessages();
            } else {
                loginError.textContent = '密钥错误';
            }
        }
        loginBtn.addEventListener('click', checkLogin);
        loginPasswordInput.addEventListener('keypress', e => { if (e.key === 'Enter') checkLogin(); });
        if (sessionStorage.getItem('admin_logged') === 'true') {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';
            loadDashboard();
            loadCategories();
            loadSoftwares();
            loadAds();
            loadUsers();
            loadMessages();
        } else {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
        }
        document.getElementById('addCategoryBtn')?.addEventListener('click', async () => {
            const name = document.getElementById('newCatName').value.trim();
            if (!name) return;
            try {
                await airtableRequest('POST', 'Categories', { fields: { Name: name } });
                showToast('分类已添加');
                cachedCategories.push(name);
                renderCategorySelects();
                renderCategoryFilters();
                document.getElementById('newCatName').value = '';
                document.getElementById('categoryModal').classList.remove('active');
            } catch (e) { showToast('添加失败', true); }
        });
        document.getElementById('closeCategoryModal')?.addEventListener('click', () => {
            document.getElementById('categoryModal').classList.remove('active');
        });
    </script>
</body>
</html>
