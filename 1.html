        // ========================  字段安全读取 ========================

            for (let name of names) {
                if (obj && obj[name] !== undefined && obj[name] !== null) return obj[name];
            }
            if (obj && typeof obj === 'object') {
                const lowerKeys = names.map(n => n.toLowerCase());
                for (let key in obj) {
                    if (lowerKeys.includes(key.toLowerCase())) {
                        const val = obj[key];
                        if (val !== undefined && val !== null) return val;

                }

        // ========================  Baserow API ========================

            if (queryParams) url += '?' + queryParams;
            const headers = {
                'Authorization': 'Token ' + CONFIG.BASEROW_TOKEN,
                'Content-Type': 'application/json'
            };
            const opts = { method: method, headers: headers };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            if (!res.ok) {
                const errText = await res.text();
                throw new Error('Baserow API error ' + res.status + ': ' + errText);
            }
            if (method === 'DELETE') return { success: true };

        // ========================  轮播图 ========================
        function renderCarousel(slidesEl, dotsEl, ads) {
            if (!ads || !ads.length) return;
            slidesEl.innerHTML = ads.map(function(ad, idx) {
                return '<div class="carousel-slide"><a href="' + esc(ad.link) + '" target="_blank" style="display:block;width:100%;height:100%;"><img src="' + esc(ad.image) + '" loading="lazy" alt="' + esc(ad.title) + '" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display=\'none\';this.parentElement.querySelector(\'.loading-placeholder\').style.display=\'flex\';"><div class="loading-placeholder" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8ecf3,#d1d5db);"><i class="fas fa-image"></i> 加载中...</div></a></div>';
            }).join('');
            if (ads.length <= 1) {
                dotsEl.style.display = 'none';
                return;
            }
            dotsEl.style.display = 'flex';
            dotsEl.innerHTML = ads.map(function(_, i) {
                return '<div class="carousel-dot ' + (i === 0 ? 'active' : '') + '" data-index="' + i + '"></div>';
            }).join('');
            var cur = 0;
            var upd = function(idx) {
                cur = idx;
                slidesEl.style.transform = 'translateX(-' + (idx * 100) + '%)';
                var dots = dotsEl.querySelectorAll('.carousel-dot');
                dots.forEach(function(d, i) {
                    d.classList.toggle('active', i === idx);
                });
            };
            dotsEl.querySelectorAll('.carousel-dot').forEach(function(d) {
                d.addEventListener('click', function() {
                    upd(parseInt(d.dataset.index));
                });
            });
            var interval = setInterval(function() {
                upd((cur + 1) % ads.length);
            }, 4000);
            var container = slidesEl.closest('.carousel-container');
            container.addEventListener('mouseenter', function() { clearInterval(interval); });
            container.addEventListener('mouseleave', function() {
                interval = setInterval(function() {
                    upd((cur + 1) % ads.length);
                }, 4000);
            });
            return upd;
        }

            var h = 0;

        function matchesSearch(software, keyword) {
            if (!keyword) return true;
            var kw = keyword.toLowerCase().trim();
            return software.name.toLowerCase().includes(kw);
        }

        // 浏览历史
        function addHistory(sw) {
            var h = JSON.parse(localStorage.getItem('browseHistory') || '[]');
            h = h.filter(function(i) { return i.name !== sw.name; });
            h.unshift({ name: sw.name, id: sw.id });
            if (h.length > 10) h.pop();
            localStorage.setItem('browseHistory', JSON.stringify(h));
            renderHistory();
        }
        function renderHistory() {
            var h = JSON.parse(localStorage.getItem('browseHistory') || '[]');
            var container = document.getElementById('historyList');
            if (!container) return;
            container.innerHTML = h.length ? h.map(function(i) {
                return '<div class="history-item" data-id="' + i.id + '">' + esc(i.name) + '</div>';
            }).join('') : '<div style="color:var(--text-muted);">暂无</div>';
            container.querySelectorAll('.history-item').forEach(function(el) {
                el.addEventListener('click', function() {
                    var sw = softwares.find(function(s) { return s.id === el.dataset.id; });
                    if (sw) downloadSoftware(sw);
                });
            });
        }

        // 收藏（本地存储）
        function toggleFavorite(softwareId, softwareName) {
            var favs = JSON.parse(localStorage.getItem('favorites') || '[]');
            var idx = favs.findIndex(function(f) { return f.id === softwareId; });
            if (idx > -1) {
                favs.splice(idx, 1);
                showToast('已取消收藏', 'success');
            } else {
                favs.unshift({ id: softwareId, name: softwareName, time: Date.now() });
                showToast('已添加到收藏', 'success');
            }
            localStorage.setItem('favorites', JSON.stringify(favs));
            return idx === -1;
        }

        // 评价
        function submitRating(softwareId, softwareName, rating, comment) {
            try {
                var allRatings = JSON.parse(localStorage.getItem('lezhe_ratings') || '{}');
                if (!allRatings[softwareId]) allRatings[softwareId] = [];
                allRatings[softwareId].push({
                    username: '访客',
                    rating: rating,
                    comment: comment,
                    createdAt: new Date().toISOString()
                });
                localStorage.setItem('lezhe_ratings', JSON.stringify(allRatings));
                showToast('评价成功！感谢反馈', 'success');
                return true;
            } catch (err) {
                console.warn(err);
                showToast('评价失败，请稍后重试', 'error');
                return false;
            }
        }

        // ========================  渲染函数 ========================
        function renderGrid() {
            var filtered = softwares.filter(function(s) {
                return (currentCategory === 'all' || s.category === currentCategory) && matchesSearch(s, searchKeyword);
            });
            var items = showAll ? filtered : filtered.slice(0, 12);
            var container = document.getElementById('softwareGridContainer');
            if (!items.length) {
                container.innerHTML = '<div style="text-align:center;padding:40px;">没有找到相关软件</div>';
                document.getElementById('loadMoreContainer').style.display = 'none';
                return;
            }
            var favs = JSON.parse(localStorage.getItem('favorites') || '[]');
            container.innerHTML = items.map(function(sw) {
                var isFav = favs.some(function(f) { return f.id === sw.id; });
                var isNew = (new Date() - new Date(sw.addedDate || '2024-01-01')) < 7 * 86400000;
                var isHot = sw.downloads > 2000;
                var osTags = (sw.os || []).map(function(o) {
                    var icon = '';
                    if (o === 'Windows') icon = '<i class="fab fa-windows"></i>';
                    else if (o === 'Mac') icon = '<i class="fab fa-apple"></i>';
                    return '<span class="os-badge">' + icon + ' ' + o + '</span>';
                }).join('');
                return '<div class="software-card" data-id="' + sw.id + '">' +
                    '<button class="favorite-btn ' + (isFav ? 'active' : '') + '" data-id="' + sw.id + '" data-name="' + esc(sw.name) + '"><i class="fas fa-heart"></i></button>' +
                    (isNew ? '<span class="new-badge">✦新</span>' : (isHot ? '<span class="hot-badge">♨热</span>' : '')) +
                    '<div class="card-header">' +
                        '<div class="card-icon">' + renderIconHtml(sw.icon, sw.name) + '</div>' +
                        '<div class="software-name">' + esc(sw.name) + '</div>' +
                    '</div>' +
                    '<div class="version">' + esc(sw.version) + '</div>' +
                    '<div class="description">' + esc(sw.description) + '</div>' +
                    '<div class="os-tags">' + osTags + '</div>' +
                    '<div class="rating-stars" id="rating-' + sw.id + '"><span style="font-size:0.65rem;color:var(--text-muted);"><i class="far fa-star"></i> 评价</span></div>' +
                    '<div class="card-footer">' +
                        '<span class="added-date">' + esc(sw.addedDate) + '</span>' +
                        '<span class="download-count"><i class="fas fa-download"></i> ' + (sw.downloads || 0) + '</span>' +
                    '</div>' +
                    '<div class="card-download-area">' +
                        '<button class="download-link-btn" data-id="' + sw.id + '"><i class="fas fa-download"></i> 下载</button>' +
                    '</div>' +
                    '</div>';
            }).join('');
            document.getElementById('loadMoreContainer').style.display = (!showAll && filtered.length > 12) ? 'block' : 'none';

            // 事件绑定：收藏按钮
            container.querySelectorAll('.favorite-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var isActive = toggleFavorite(btn.dataset.id, btn.dataset.name);
                    btn.classList.toggle('active', isActive);
                });
            });

            // 事件绑定：下载按钮
            container.querySelectorAll('.download-link-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var sw = softwares.find(function(s) { return s.id == btn.dataset.id; });
                    if (sw) downloadSoftware(sw);
                });
            });

            // 事件绑定：卡片点击（点击卡片主体触发下载）
            container.querySelectorAll('.software-card').forEach(function(card) {
                card.addEventListener('click', function(e) {
                    // 如果点击的是收藏按钮或下载按钮，不触发
                    if (e.target.closest('.favorite-btn') || e.target.closest('.download-link-btn')) {
                        return;
                    }
                    var sw = softwares.find(function(s) { return s.id == card.dataset.id; });
                    if (sw) downloadSoftware(sw);
                });
            });

            // 事件绑定：评价星星
            container.querySelectorAll('.rating-stars').forEach(function(ratingSpan) {
                ratingSpan.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var card = ratingSpan.closest('.software-card');
                    var sw = softwares.find(function(s) { return s.id === card.dataset.id; });
                    if (sw) {
                        document.getElementById('ratingSoftwareName').innerText = sw.name;
                        document.getElementById('ratingSoftwareId').value = sw.id;
                        document.getElementById('ratingModal').classList.add('active');
                        var stars = document.querySelectorAll('#ratingStarsInput i');
                        stars.forEach(function(star, idx) {
                            star.className = 'far fa-star';
                            star.onclick = function() {
                                var rating = idx + 1;
                                stars.forEach(function(s, i) {
                                    if (i < rating) {
                                        s.className = 'fas fa-star';
                                        s.style.color = '#fbbf24';
                                    } else {
                                        s.className = 'far fa-star';
                                        s.style.color = '';
                                    }
                                });

                });
            });

        // 日历
        var currentDate = new Date();
        function renderCalendar() {
            var y = currentDate.getFullYear(), m = currentDate.getMonth();
            var fd = new Date(y, m, 1).getDay();
            var days = new Date(y, m + 1, 0).getDate();
            var mn = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
            document.getElementById('calendarMonthYear').innerText = y + '年 ' + mn[m];
            var el = document.getElementById('calendarDays');
            var h = '<div class="calendar-day-name">一</div><div class="calendar-day-name">二</div><div class="calendar-day-name">三</div><div class="calendar-day-name">四</div><div class="calendar-day-name">五</div><div class="calendar-day-name">六</div><div class="calendar-day-name">日</div>';
            var d = 1;
            for (var i = 0; i < 6; i++) {
                for (var j = 0; j < 7; j++) {
                    if (i === 0 && j < (fd === 0 ? 6 : fd - 1)) {
                        h += '<div class="calendar-day"></div>';
                    } else if (d > days) {
                        h += '<div class="calendar-day"></div>';
                    } else {
                        var isToday = (d === new Date().getDate() && m === new Date().getMonth() && y === new Date().getFullYear());
                        var cls = 'calendar-day';
                        if (isToday) cls += ' today';
                        h += '<div class="' + cls + '" data-day="' + d + '">' + d + '</div>';
                        d++;
                    }
                }
            }
            el.innerHTML = h;
        }

        function renderCats() {
            var cats = softwares.map(function(s) { return s.category; }).filter(function(v, i, a) { return a.indexOf(v) === i; });
            var container = document.getElementById('categoryTabs');
            if (!container) return;
            var isMobile = window.innerWidth <= 768;
            var visibleLimit = isMobile ? 4 : 5;
            var hasMore = cats.length > visibleLimit;
            var html = '<button class="cat-chip ' + (currentCategory === 'all' ? 'active' : '') + '" data-cat="all"><i class="fas fa-th-large"></i> 全部</button>';
            var visibleCats = cats.slice(0, visibleLimit);
            for (var i = 0; i < visibleCats.length; i++) {
                var cat = visibleCats[i];
                var icon = cat === '3D建模' ? 'fa-cube' : (cat === '图像处理' ? 'fa-palette' : (cat === '视频剪辑' ? 'fa-video' : (cat === '工程设计' ? 'fa-drafting-compass' : 'fa-tag')));
                html += '<button class="cat-chip ' + (currentCategory === cat ? 'active' : '') + '" data-cat="' + cat + '"><i class="fas ' + icon + '"></i> ' + cat + '</button>';
            }
            if (hasMore) {
                html += '<button class="more-cats-btn" id="moreCatsBtn"><i class="fas fa-chevron-down"></i> 更多分类</button>';
                container.innerHTML = html;
                var menu = document.querySelector('.cat-more-menu');
                if (!menu) {
                    menu = document.createElement('div');
                    menu.className = 'cat-more-menu';
                    container.appendChild(menu);
                }
                var moreBtn = document.getElementById('moreCatsBtn');
                var hiddenCats = cats.slice(visibleLimit);
                menu.innerHTML = hiddenCats.map(function(cat) {
                    var icon2 = cat === '3D建模' ? 'fa-cube' : (cat === '图像处理' ? 'fa-palette' : (cat === '视频剪辑' ? 'fa-video' : (cat === '工程设计' ? 'fa-drafting-compass' : 'fa-tag')));
                    return '<div class="cat-chip-more ' + (currentCategory === cat ? 'active' : '') + '" data-cat="' + cat + '"><i class="fas ' + icon2 + '"></i> ' + cat + '</div>';
                }).join('');
                menu.querySelectorAll('.cat-chip-more').forEach(function(el) {
                    el.addEventListener('click', function(e) {
                        e.stopPropagation();
                        currentCategory = el.dataset.cat;
                        showAll = false;
                        renderCats();
                        renderGrid();
                        menu.classList.remove('show');
                    });
                });
                moreBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    menu.classList.toggle('show');
                });
                document.addEventListener('click', function(e) {
                    if (menu && !menu.contains(e.target) && e.target !== moreBtn) menu.classList.remove('show');
                });
            } else {
                container.innerHTML = html;
                var oldMenu = container.querySelector('.cat-more-menu');
                if (oldMenu) oldMenu.remove();
            }
            container.querySelectorAll('.cat-chip').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    currentCategory = btn.dataset.cat;
                    showAll = false;
                    renderCats();
                    renderGrid();
                });
            });
        }

        function setDailyRecommend() {
            var today = new Date().toDateString();
            var cached = localStorage.getItem('daily_recommend');
            if (cached) {
                var parsed = JSON.parse(cached);
                if (parsed.date === today && parsed.software) {
                    dailySoftware = parsed.software;
                    renderDailyRecommend();
                    return;
                }
            }
            var topSoftwares = softwares.slice().sort(function(a, b) { return (b.downloads || 0) - (a.downloads || 0); }).slice(0, 10);
            if (topSoftwares.length) {
                var randomIndex = Math.floor(Math.random() * Math.min(topSoftwares.length, 5));
                dailySoftware = topSoftwares[randomIndex];
                localStorage.setItem('daily_recommend', JSON.stringify({ date: today, software: dailySoftware }));
                renderDailyRecommend();
            }
        }

        function renderDailyRecommend() {
            var section = document.getElementById('dailySection');
            if (!section || !dailySoftware) return;
            section.style.display = 'block';
            document.getElementById('dailyName').innerText = dailySoftware.name;
            document.getElementById('dailyDesc').innerText = dailySoftware.description || '暂无描述';
            document.getElementById('dailyVersion').innerHTML = '<i class="fas fa-code-branch"></i> ' + (dailySoftware.version || '最新版');
            var osHtml = dailySoftware.os.map(function(o) {
                if (o === 'Windows') return '<i class="fab fa-windows"></i>';
                if (o === 'Mac') return '<i class="fab fa-apple"></i>';
                return o;
            }).join(' · ');
            document.getElementById('dailyOs').innerHTML = osHtml;
            document.getElementById('dailyDownloads').innerHTML = '<i class="fas fa-download"></i> ' + (dailySoftware.downloads || 0) + '次下载';
            var iconContainer = document.getElementById('dailyIcon');
            if (dailySoftware.icon && dailySoftware.icon.startsWith('http')) {
                iconContainer.innerHTML = '<img src="' + esc(dailySoftware.icon) + '" style="width:100%;height:100%;object-fit:cover;border-radius:16px;">';

                var abbr = getStdAbbr(dailySoftware.name);

            });

        // ========================  初始化 ========================
        async function loadAll() {
            var overlay = document.getElementById('loadingOverlay');

            document.getElementById('appWrapper').classList.add('loaded');
            softwares = await fetchSoftwares();
            var adData = await fetchAds();

            sidebarAds = adData.filter(function(a) { return a.position === 'sidebar'; });
            if (bannerAds.length) renderCarousel(document.getElementById('categoryBannerSlides'), document.getElementById('categoryBannerDots'), bannerAds);
            if (sidebarAds.length) renderCarousel(document.getElementById('sidebarCarouselSlides'), document.getElementById('sidebarCarouselDots'), sidebarAds);
            articles = await fetchArticles();
            renderCats();

            renderCalendar();
            setDailyRecommend();

        // 热门滚动自动播放
        var autoScrollInterval = null, scrollDirection = 1, currentScrollPos = 0;
        function startAutoScroll() {
            var s = document.getElementById('hotScroll');
            if (!s || !s.children.length) return;
            if (autoScrollInterval) clearInterval(autoScrollInterval);
            autoScrollInterval = setInterval(function() {
                if (!s || s.children.length === 0) return;
                var max = s.scrollWidth - s.clientWidth;
                if (max <= 0) return;
                var step = 182;
                var pos = currentScrollPos + step * scrollDirection;
                if (pos >= max) {
                    pos = max;
                    scrollDirection = -1;
                } else if (pos <= 0) {
                    pos = 0;
                    scrollDirection = 1;
                }
                currentScrollPos = pos;
                s.scrollTo({ left: currentScrollPos, behavior: 'smooth' });
            }, 2000);
        }
        function stopAutoScroll() { if (autoScrollInterval) clearInterval(autoScrollInterval); autoScrollInterval = null; }
        document.addEventListener('DOMContentLoaded', function() {
            var h = document.getElementById('hotScroll');
            if (h) {
                h.addEventListener('mouseenter', stopAutoScroll);
                h.addEventListener('mouseleave', startAutoScroll);
                h.addEventListener('scroll', function() { currentScrollPos = h.scrollLeft; });
            }
        });

        // 加载
        if (!sessionStorage.getItem('has_loaded_before')) {
            var overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.style.display = 'flex';
            sessionStorage.setItem('has_loaded_before', 'true');
        } else {
            var overlay2 = document.getElementById('loadingOverlay');
            if (overlay2) overlay2.style.display = 'none';
            document.getElementById('appWrapper').classList.add('loaded');
        }
        loadAll();
    </script>
</body>
</html>
